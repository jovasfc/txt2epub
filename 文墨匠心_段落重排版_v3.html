            if (restoreBtn) {
                restoreBtn.classList.add('hidden');
            }
        }

        function openFindReplace() {
            const findReplaceBar = document.getElementById('find-replace-bar');
            findReplaceBar.classList.remove('hidden');
            document.getElementById('find-input').focus();
            document.getElementById('chapter-list-nav').classList.add('hidden');
        }

        function hideFindReplace() {
            const findReplaceBar = document.getElementById('find-replace-bar');
            findReplaceBar.classList.add('hidden');
            document.getElementById('find-input').value = '';
            document.getElementById('replace-input').value = '';
            matches = [];
            currentMatchIndex = -1;
            if (highlightedChapter) {
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (chapter) {
                    highlightContent(chapter.content, []);
                }
                document.getElementById('chapter-list-nav').classList.remove('hidden');
            }
        }

        function clearFindMatches() {
            matches = [];
            currentMatchIndex = -1;
        }

        function findOrNext() {
            if (matches.length === 0) {
                executeFind('chapter');
            } else {
                findNext();
            }
        }

        function findOrNextAll() {
            if (matches.length === 0) {
                executeFind('all');
            } else {
                findNextAll();
            }
        }

        function executeFind(scope) {
            const findText = document.getElementById('find-input').value.trim();

            if (!findText) {
                return;
            }

            if (scope === 'chapter') {
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (!chapter) return;

                const regex = new RegExp(escapeRegex(findText), 'g');
                const chapterMatches = chapter.content.match(regex);
                const count = chapterMatches ? chapterMatches.length : 0;
                
                if (count === 0) {
                    currentMatchIndex = -1;
                    matches = [];
                    highlightContent(chapter.content, []);
                    return;
                }

                matches = [];
                let match;
                const searchRegex = new RegExp(escapeRegex(findText), 'gi');
                while ((match = searchRegex.exec(chapter.content)) !== null) {
                    matches.push({
                        index: match.index,
                        text: match[0],
                        end: match.index + match[0].length
                    });
                }

                if (matches.length > 0) {
                    currentMatchIndex = 0;
                    highlightContent(chapter.content, matches);
                    scrollToMatch();
                }
            } else if (scope === 'all') {
                let totalCount = 0;
                let firstMatchChapter = null;
                let firstMatchIndex = -1;

                for (let i = 0; i < chapters.length; i++) {
                    const regex = new RegExp(escapeRegex(findText), 'g');
                    const chapterMatches = chapters[i].content.match(regex);
                    if (chapterMatches && chapterMatches.length > 0) {
                        totalCount += chapterMatches.length;
                        if (firstMatchChapter === null) {
                            firstMatchChapter = chapters[i];
                            firstMatchIndex = i;
                        }
                    }
                }

                if (firstMatchChapter) {
                    selectChapter(firstMatchChapter.id);
                    setTimeout(() => {
                        const regex = new RegExp(escapeRegex(findText), 'g');
                        const chapterMatches = firstMatchChapter.content.match(regex);
                        const count = chapterMatches ? chapterMatches.length : 0;
                        
                        if (count > 0) {
                            matches = [];
                            let match;
                            const searchRegex = new RegExp(escapeRegex(findText), 'gi');
                            while ((match = searchRegex.exec(firstMatchChapter.content)) !== null) {
                                matches.push({
                                    index: match.index,
                                    text: match[0],
                                    end: match.index + match[0].length
                                });
                            }

                            if (matches.length > 0) {
                                currentMatchIndex = 0;
                                highlightContent(firstMatchChapter.content, matches);
                                scrollToMatch();
                            }
                        }
                    }, 100);
                }
            }
        }

        function highlightContent(content, matchList) {
            const editableContent = document.getElementById('editable-content');
            const previewContent = document.getElementById('preview-content');
            
            if (matchList.length === 0) {
                if (editableContent) {
                    const fontFamilyClass = contentLayout.fontFamily === 'serif' ? 'font-serif' : 'font-sans';
                    const paragraphs = content.split('\n').filter(p => p.trim());
                    const formattedContent = paragraphs.map(p => `<p style="margin-bottom: ${contentLayout.paragraphSpacing}px;">${escapeHtml(p)}</p>`).join('');
                    editableContent.innerHTML = formattedContent;
                    editableContent.addEventListener('mouseup', handleTextSelection);
                    editableContent.addEventListener('keyup', handleTextSelection);
                }
                return;
            }

            let highlightedContent = '';
            let lastIndex = 0;

            matchList.forEach((match, index) => {
                highlightedContent += escapeHtml(content.substring(lastIndex, match.index));
                const highlightClass = index === currentMatchIndex ? 'current-match' : 'match-highlight';
                highlightedContent += `<span class="${highlightClass}">${escapeHtml(match.text)}</span>`;
                lastIndex = match.end;
            });

            highlightedContent += escapeHtml(content.substring(lastIndex));

            if (editableContent) {
                editableContent.innerHTML = highlightedContent;
                editableContent.addEventListener('mouseup', handleTextSelection);
                editableContent.addEventListener('keyup', handleTextSelection);
            }

            if (previewContent && !isEditMode) {
                // 创建包含高亮的完整内容
                let highlightedPreviewContent = '';
                let previewLastIndex = 0;

                matchList.forEach((match, index) => {
                    highlightedPreviewContent += escapeHtml(content.substring(previewLastIndex, match.index));
                    const highlightClass = index === currentMatchIndex ? 'current-match' : 'match-highlight';
                    highlightedPreviewContent += `<span class="${highlightClass}">${escapeHtml(match.text)}</span>`;
                    previewLastIndex = match.end;
                });

                highlightedPreviewContent += escapeHtml(content.substring(previewLastIndex));

                // 按段落分割并包装
                const paragraphs = highlightedPreviewContent.split('\n');
                const formattedParagraphs = paragraphs
                    .filter(p => p.trim())
                    .map(p => `<p style="margin-bottom: ${contentLayout.paragraphSpacing}px;">${p}</p>`)
                    .join('');

                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                const fontFamilyClass = contentLayout.fontFamily === 'serif' ? 'font-serif' : 'font-sans';
                
                previewContent.innerHTML = `
                    <h2 class="text-center font-bold mb-4 ${fontFamilyClass}" style="font-size: ${contentLayout.chapterTitleFontSize}px;">${escapeHtml(chapter ? chapter.title : '')}</h2>
                    <div id="editable-content" class="whitespace-pre-wrap text-left ${fontFamilyClass}" style="font-size: ${contentLayout.fontSize}px; line-height: ${contentLayout.lineSpacing};" contenteditable="false">${formattedParagraphs}</div>
                `;
                
                const newEditableContent = document.getElementById('editable-content');
                if (newEditableContent) {
                    newEditableContent.addEventListener('mouseup', handleTextSelection);
                    newEditableContent.addEventListener('keyup', handleTextSelection);
                }
            }
        }

        function scrollToMatch() {
            const currentMatch = document.querySelector('.current-match');
            if (currentMatch) {
                currentMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function findNext() {
            if (matches.length === 0) return;

            currentMatchIndex = (currentMatchIndex + 1) % matches.length;
            const chapter = chapters.find(ch => ch.id === highlightedChapter);
            if (chapter) {
                highlightContent(chapter.content, matches);
                scrollToMatch();
            }
        }

        function findNextAll() {
            if (matches.length === 0) return;

            // 如果当前章节还有后续匹配项，直接跳到下一个匹配项
            if (currentMatchIndex < matches.length - 1) {
                currentMatchIndex++;
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (chapter) {
                    highlightContent(chapter.content, matches);
                    scrollToMatch();
                }
                return;
            }

            // 当前章节已无更多匹配项，查找下一个有匹配项的章节
            const findText = document.getElementById('find-input').value.trim();
            if (!findText) return;
            
            let currentChapterIndex = chapters.findIndex(ch => ch.id === highlightedChapter);
            if (currentChapterIndex === -1) return;
            
            // 从下一个章节开始查找
            for (let i = currentChapterIndex + 1; i < chapters.length; i++) {
                const regex = new RegExp(escapeRegex(findText), 'gi');
                let tempMatch;
                const tempMatches = [];
                const searchContent = chapters[i].content;
                
                while ((tempMatch = regex.exec(searchContent)) !== null) {
                    tempMatches.push({
                        index: tempMatch.index,
                        text: tempMatch[0],
                        end: tempMatch.index + tempMatch[0].length
                    });
                }
                
                if (tempMatches.length > 0) {
                    selectChapter(chapters[i].id);
                    setTimeout(() => {
                        matches = tempMatches;
                        currentMatchIndex = 0; // 跳转到第一个匹配项
                        highlightContent(chapters[i].content, matches);
                        scrollToMatch();
                    }, 100);
                    return;
                }
            }
            
            // 如果没找到，从头开始查找（循环查找）
            for (let i = 0; i < currentChapterIndex; i++) {
                const regex = new RegExp(escapeRegex(findText), 'gi');
                let tempMatch;
                const tempMatches = [];
                const searchContent = chapters[i].content;
                
                while ((tempMatch = regex.exec(searchContent)) !== null) {
                    tempMatches.push({
                        index: tempMatch.index,
                        text: tempMatch[0],
                        end: tempMatch.index + tempMatch[0].length
                    });
                }
                
                if (tempMatches.length > 0) {
                    selectChapter(chapters[i].id);
                    setTimeout(() => {
                        matches = tempMatches;
                        currentMatchIndex = 0; // 跳转到第一个匹配项
                        highlightContent(chapters[i].content, matches);
                        scrollToMatch();
                    }, 100);
                    return;
                }
            }
        }

        function executeReplace(scope) {
            const findText = document.getElementById('find-input').value.trim();
            const replaceText = document.getElementById('replace-input').value;

            if (!findText) {
                return;
            }

            if (!isEditMode) {
                toggleEditMode();
            }

            if (scope === 'chapter') {
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (!chapter) return;

                const regex = new RegExp(escapeRegex(findText));
                const newContent = chapter.content.replace(regex, replaceText);
                
                if (newContent === chapter.content) {
                    return;
                }

                chapter.content = newContent;

                const summary = newContent.split('\n').find(l => l.trim().length > 0) || "";
                chapter.summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");

                updateChapterList();
                
                matches = [];
                let match;
                const searchRegex = new RegExp(escapeRegex(findText), 'gi');
                while ((match = searchRegex.exec(chapter.content)) !== null) {
                    matches.push({
                        index: match.index,
                        text: match[0],
                        end: match.index + match[0].length
                    });
                }

                if (matches.length > 0) {
                    currentMatchIndex = 0;
                    highlightContent(chapter.content, matches);
                    scrollToMatch();
                } else {
                    currentMatchIndex = -1;
                    highlightContent(chapter.content, []);
                }
                
                setTimeout(() => findNext(), 100);
            }
        }

        function executeFindReplace(scope) {
            const findText = document.getElementById('find-input').value.trim();
            const replaceText = document.getElementById('replace-input').value;

            if (!findText) {
                return;
            }

            if (!isEditMode) {
                toggleEditMode();
            }

            if (scope === 'chapter') {
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (!chapter) return;

                const newContent = chapter.content.replace(new RegExp(escapeRegex(findText), 'g'), replaceText);
                chapter.content = newContent;

                const summary = newContent.split('\n').find(l => l.trim().length > 0) || "";
                chapter.summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");

                updateChapterList();
                
                matches = [];
                let match;
                const searchRegex = new RegExp(escapeRegex(findText), 'gi');
                while ((match = searchRegex.exec(chapter.content)) !== null) {
                    matches.push({
                        index: match.index,
                        text: match[0],
                        end: match.index + match[0].length
                    });
                }

                if (matches.length > 0) {
                    currentMatchIndex = 0;
                    highlightContent(chapter.content, matches);
                    scrollToMatch();
                } else {
                    currentMatchIndex = -1;
                    highlightContent(chapter.content, []);
                }
            } else if (scope === 'all') {
                let totalReplacements = 0;
                chapters.forEach(ch => {
                    const regex = new RegExp(escapeRegex(findText), 'g');
                    const matches = ch.content.match(regex);
                    if (matches) {
                        totalReplacements += matches.length;
                    }
                    const newContent = ch.content.replace(regex, replaceText);
                    ch.content = newContent;
                    const summary = newContent.split('\n').find(l => l.trim().length > 0) || "";
                    ch.summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");
                });

                updateChapterList();
                
                const chapter = chapters.find(ch => ch.id === highlightedChapter);
                if (chapter) {
                    matches = [];
                    let match;
                    const searchRegex = new RegExp(escapeRegex(findText), 'gi');
                    while ((match = searchRegex.exec(chapter.content)) !== null) {
                        matches.push({
                            index: match.index,
                            text: match[0],
                            end: match.index + match[0].length
                        });
                    }

                    if (matches.length > 0) {
                        currentMatchIndex = 0;
                        highlightContent(chapter.content, matches);
                        scrollToMatch();
                    } else {
                        currentMatchIndex = -1;
                        highlightContent(chapter.content, []);
                    }
                }
            }
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function handleReflowParagraphs() {
            if (!confirm('确定要重排所有段落吗？\n\n这将合并错误分行的短段落，恢复正常的段落格式。')) return;
            
            const addIndent = document.getElementById('add-indent').checked;
            const indentStr = addIndent ? '　　' : ''; // 两个全角空格作为缩进
            
            chapters = chapters.map(chapter => {
                const lines = chapter.content.split('\n');
                const reflowedLines = [];
                let currentParagraph = [];
                
                lines.forEach(line => {
                    const trimmedLine = line.trim();
                    
                    if (!trimmedLine) {
                        if (currentParagraph.length > 0) {
                            const paragraphText = currentParagraph.join('').trim();
                            if (paragraphText) {
                                reflowedLines.push(indentStr + paragraphText);
                            }
                            currentParagraph = [];
                        }
                    } else {
                        const lastChar = trimmedLine.charAt(trimmedLine.length - 1);
                        const endPunctuation = ['。', '！', '？', '…'];
                        const endQuotes = ['"', '"', "'", "'", ')', '）', '》', '」', '』'];
                        
                        const hasEndPunctuation = endPunctuation.includes(lastChar);
                        const hasEndQuote = endQuotes.includes(lastChar);
                        
                        currentParagraph.push(trimmedLine);
                        
                        if (hasEndPunctuation || hasEndQuote) {
                            const paragraphText = currentParagraph.join('').trim();
                            if (paragraphText) {
                                reflowedLines.push(indentStr + paragraphText);
                            }
                            currentParagraph = [];
                        }
                    }
                });
                
                if (currentParagraph.length > 0) {
                    const paragraphText = currentParagraph.join('').trim();
                    if (paragraphText) {
                        reflowedLines.push(indentStr + paragraphText);
                    }
                }
                
                return {
                    ...chapter,
                    content: reflowedLines.join('\n\n'),
                    summary: reflowedLines[0] ? (reflowedLines[0].slice(0, 60) + (reflowedLines[0].length > 60 ? "..." : "")) : ""
                };
            });
            
            updateChapterList();
            if (highlightedChapter) {
                selectChapter(highlightedChapter);
            }
            alert(`已重排 ${chapters.length} 个章节的段落`);
        }

        async function handleExportTxt() {
            if (chapters.length === 0) {
                showError("没有可导出的章节。");
                return;
            }

            isExporting = true;
            document.getElementById('export-txt-btn').disabled = true;
            document.getElementById('export-txt-text').textContent = '正在导出...';
            clearError();

            try {
                const bookTitle = document.getElementById('book-title').value || '未命名书籍';
                const author = document.getElementById('author').value || '佚名';
                const paragraphSpacing = parseInt(document.getElementById('paragraph-spacing').value);

                // 构建TXT内容
                let txtContent = '';
                
                // 添加书名和作者信息
                txtContent += `${bookTitle}\n`;
                txtContent += `作者：${author}\n`;
                txtContent += `\n`;
                txtContent += `==================\n`;
                txtContent += `\n`;

                // 添加各章节内容
                chapters.forEach((ch, index) => {
                    txtContent += `${ch.title}\n`;
                    txtContent += `\n`;
                    txtContent += ch.content;
                    txtContent += `\n`;
                    
                    // 根据段间距添加空行
                    const emptyLines = Math.floor(paragraphSpacing / 16);
                    for (let i = 0; i < emptyLines; i++) {
                        txtContent += `\n`;
                    }
                    
                    // 章节之间添加分隔线（除了最后一章）
                    if (index < chapters.length - 1) {
                        txtContent += `==================\n`;
                        txtContent += `\n`;
                    }
                });

                // 创建Blob并下载
                const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${bookTitle}.txt`;
                a.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error("Export TXT failed", err);
                showError("导出 TXT 时出错，请稍后重试。");
            } finally {
                isExporting = false;
                document.getElementById('export-txt-btn').disabled = false;

        function renderCover() {
            const canvas = document.getElementById('cover-canvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const { title, author: authPos } = coverLayout;

            ctx.clearRect(0, 0, 450, 600);

            if (bgImage && bgImage.complete) {
                if (bgImageScaleMode === 'cover') {
                    ctx.drawImage(bgImage, 0, 0, 450, 600);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(0, 0, 450, 600);
                } else {
                    const canvasRatio = 450 / 600;
                    const imageRatio = bgImage.width / bgImage.height;
                    
                    let drawWidth, drawHeight, drawX, drawY;
                    
                    if (imageRatio > canvasRatio) {
                        drawWidth = 450;
                        drawHeight = 450 / imageRatio;
                        drawX = 0;
                        drawY = (600 - drawHeight) / 2;
                    } else {
                        drawHeight = 600;
                        drawWidth = 600 * imageRatio;
                        drawX = (450 - drawWidth) / 2;
                        drawY = 0;
                    }
                    
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(0, 0, 450, 600);
                    ctx.drawImage(bgImage, drawX, drawY, drawWidth, drawHeight);
                    ctx.fillStyle = 'rgba(0,0,0,0.2)';
                    ctx.fillRect(0, 0, 450, 600);
                }
            } else {
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, 450, 600);
            }

            const drawDecorations = () => {
                ctx.save();
                const margin = 20;

                const drawCorner = (x, y, horizontalDir, verticalDir) => {
                    ctx.save();
                    ctx.strokeStyle = 'rgba(255,255,255, 0.4)';
                    ctx.lineWidth = 2;

                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x, y + 55 * verticalDir);
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + 55 * horizontalDir, y);
                    ctx.stroke();

                    ctx.strokeStyle = 'rgba(255,255,255, 0.15)';
                    ctx.lineWidth = 1;

                    ctx.beginPath();
                    ctx.moveTo(x + 8 * horizontalDir, y + 8 * verticalDir);
                    ctx.lineTo(x + 8 * horizontalDir, y + 45 * verticalDir);
                    ctx.moveTo(x + 8 * horizontalDir, y + 8 * verticalDir);
                    ctx.lineTo(x + 45 * horizontalDir, y + 8 * verticalDir);
                    ctx.stroke();

                    ctx.restore();
                };

                drawCorner(margin, margin, 1, 1);
                drawCorner(450 - margin, margin, -1, 1);
                drawCorner(margin, 600 - margin, 1, -1);
                drawCorner(450 - margin, 600 - margin, -1, -1);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 0.8;

                ctx.beginPath();
                ctx.moveTo(225, 70);
                ctx.lineTo(225, 530);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(78, 300);
                ctx.lineTo(371, 300);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
                const dotSize = 2.5;
                ctx.beginPath();
                ctx.arc(margin + 8, margin + 8, dotSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(450 - margin - 8, margin + 8, dotSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(margin + 8, 600 - margin - 8, dotSize, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(450 - margin - 8, 600 - margin - 8, dotSize, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            };

            drawDecorations();

            const drawSeal = (x, y, size) => {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(-0.1);

                ctx.fillStyle = 'rgba(180, 40, 40, 0.85)';
                ctx.shadowBlur = 4;
                ctx.shadowColor = 'rgba(0,0,0,0.3)';

                const rectSize = size;
                ctx.beginPath();
                ctx.roundRect(-rectSize/2, -rectSize/2, rectSize, rectSize, 4);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.font = `bold ${size * 0.35}px "Noto Serif SC", serif`;

                ctx.fillText('文墨', 0, -size * 0.2);
                ctx.fillText('匠心', 0, size * 0.2);

                ctx.restore();
            };

            drawSeal(390, 540, 40);

            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';

            const bookTitle = (document.getElementById('book-title').value || '').trim() || '未命名书籍';
            const authorName = (document.getElementById('author').value || '').trim() || '佚名';

            const drawText = (text, x, y, size1, size2, isVertical) => {
                if (!text || text.trim() === '') return;
                
                const lines = text.split(' ').filter(line => line.trim());
                
                if (lines.length === 0) return;
                
                if (isVertical) {
                    const colSpacing = size1 * 1.3;
                    const totalWidth = lines.length * colSpacing;
                    
                    lines.forEach((lineText, colIdx) => {
                        const chars = lineText.split('');
                        const charSize = size1 * 1.1;
                        const totalHeight = chars.length * charSize;
                        const colX = x + (totalWidth / 2) - (colIdx * colSpacing) - (colSpacing / 2);

                        chars.forEach((char, charIdx) => {
                            const charY = y - (totalHeight / 2) + (charIdx * charSize) + (size1 / 2);
                            ctx.font = `900 ${size1}px "Noto Serif SC", serif`;
                            ctx.fillText(char, colX, charY);
                        });
                    });
                } else {
                    const avgSize = (size1 + size2) / 2;
                    const lineHeight = avgSize * 1.1;
                    const totalHeight = lines.length * lineHeight;
                    
                    lines.forEach((line, i) => {
                        const currentSize = (i === 0) ? size1 : size2;
                        const lineY = y - (totalHeight / 2) + (i * lineHeight) + (lineHeight / 2);
                        ctx.font = `900 ${currentSize}px "Noto Serif SC", serif`;
                        ctx.fillText(line, x, lineY);
                    });
                }
            };

            if (coverLayout.showTitle) {
                drawText(bookTitle, title.x, title.y, title.size1, title.size2, title.vertical);
            }

            if (coverLayout.showAuthor) {
                const fullAuthorName = `${authorName}　著`;
                drawAuthorText = (text, x, y, size, isVertical) => {
                    ctx.font = `${isVertical ? '700' : '900'} ${size}px "Noto Serif SC", serif`;
                    if (!isVertical) {
                        ctx.fillText(text, x, y);
                    } else {
                        const chars = text.split('');
                        const totalHeight = chars.length * size * 1.1;
                        chars.forEach((char, i) => {
                            ctx.fillText(char, x, y - totalHeight/2 + i * size * 1.1 + size/2);
                        });
                    }
                };

                drawAuthorText(fullAuthorName, authPos.x, authPos.y, authPos.size, authPos.vertical);
            }
            ctx.shadowBlur = 0;
        }

        async function generateSummary() {
            const chapter = chapters.find(ch => ch.id === highlightedChapter);
            if (!chapter) return;

            if (!confirm('确定要生成文章概述吗？\n\n概述将根据正文内容生成约200字的简介，并插入到前言部分之后。')) {
                return;
            }

            showLoadingAnimation();

            const aiType = document.getElementById('ai-type').value;
            const apiKey = document.getElementById('api-key').value.trim();
            const content = chapter.content;
            
            let summary = '';
            
            try {
                if (aiType === 'simple') {
                    summary = generateSimpleSummary(content);
                } else if (aiType === 'zhipu') {
                    if (!apiKey) {
                        hideLoadingAnimation();
                        alert('请先输入智谱AI API密钥');
                        return;
                    }
                    try {
                        summary = await generateSummaryWithZhipuAI(content, apiKey);
                    } catch (error) {
                        if (!confirm('智谱AI生成概述失败：' + error.message + '\n\n是否使用简单方法生成概述？')) {
                            hideLoadingAnimation();
                            return;
                        }
                        summary = generateSimpleSummary(content);
                    }
                } else if (aiType === 'openai') {
                    if (!apiKey) {
                        hideLoadingAnimation();
                        alert('请先输入OpenAI API密钥');
                        return;
                    }
                    try {
                        summary = await generateSummaryWithOpenAI(content, apiKey);
                    } catch (error) {
                        if (!confirm('OpenAI生成概述失败：' + error.message + '\n\n是否使用简单方法生成概述？')) {
                            hideLoadingAnimation();
                            return;
                        }
                        summary = generateSimpleSummary(content);
                    }
                } else {
                    if (!confirm('未选择AI类型。\n\n是否使用简单方法生成概述？')) {
                        hideLoadingAnimation();
                        return;
                    }
                    summary = generateSimpleSummary(content);
                }

                const prefaceIndex = chapters.findIndex(ch => ch.title === '前言' || ch.title.includes('前言'));
                
                if (prefaceIndex !== -1) {
                    const prefaceChapter = chapters[prefaceIndex];
                    const newContent = prefaceChapter.content + '\n\n【概述】\n' + summary;
                    
                    prefaceChapter.content = newContent;
                    const summaryLine = newContent.split('\n').find(l => l.trim().length > 0) || "";
                    prefaceChapter.summary = summaryLine.slice(0, 60) + (summaryLine.length > 60 ? "..." : "");
                    
                    updateChapterList();
                    
                    if (highlightedChapter === prefaceChapter.id) {
                        selectChapter(prefaceChapter.id);
                    }
                    
                    hideLoadingAnimation();
                    alert('概述已生成并添加到前言章节之后。');
                } else {
                    hideLoadingAnimation();
                    alert('未找到前言章节，无法添加概述。');
                }
            } catch (error) {
                hideLoadingAnimation();
                alert('生成概述时出错：' + error.message);
            }
        }

        async function generateSummaryWithZhipuAI(content, apiKey) {
            const prompt = `请根据以下文章内容，生成一个约200字的概述。概述应该简洁明了，突出文章的主要内容和主题。\n\n文章内容：\n${content.substring(0, 3000)}`;
            
            const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'glm-4',
                    messages: [
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    max_tokens: 300,
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'API请求失败');
            }

            const data = await response.json();
            const summary = data.choices[0]?.message?.content || '';
            
            if (!summary) {
                throw new Error('未获取到概述内容');
            }
            
            return summary.trim();
        }

        async function generateAICoverImage() {
            let bookTitle = document.getElementById('book-title').value.trim();
            let author = document.getElementById('author').value.trim();
            const aiType = document.getElementById('ai-type').value;
            const apiKey = document.getElementById('api-key').value.trim();
            
            if (!coverLayout.showTitle) {
                bookTitle = '未命名书籍';
            }
            if (!coverLayout.showAuthor) {
                author = '佚名';
            }
            
            if (!bookTitle) {
                alert('请先输入书名');
                return;
            }
            
            if (!aiType || aiType === 'simple') {
                alert('请先选择AI类型（智谱AI或OpenAI）');
                return;
            }
            
            if (!apiKey) {
                alert('请先输入API密钥');
                return;
            }
            
            if (!confirm('确定要使用AI生成封面图吗？\n\n这将消耗API配额，可能产生费用。')) {
                return;
            }
            
            const prompt = `请为以下书籍生成一个专业的中文书籍封面图。

书名：${bookTitle}
作者：${author || '佚名'}

要求：
1. 设计风格：优雅、现代、具有文学气息
2. 色彩：和谐、温暖、符合书籍主题
3. 构图：简洁大气，突出书名
4. 背景：简洁干净，可适当添加装饰元素
5. 整体效果：适合作为正式出版的书籍封面

请生成一张高质量的封面图片。`;
            
            try {
                let imageUrl = '';
                
                if (aiType === 'zhipu') {
                    alert('智谱AI暂不支持图像生成，请使用OpenAI生成封面图。');
                    return;
                } else if (aiType === 'openai') {
                    imageUrl = await generateCoverImageWithOpenAI(prompt, apiKey);
                }
                
                if (imageUrl) {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = function() {
                        bgImage = img;
                        renderCover();
                        alert('封面图已生成并应用！');
                    };
                    img.onerror = function() {
                        alert('加载封面图失败，请重试。');
                    };
                    img.src = imageUrl;
                }
            } catch (error) {
                alert('生成封面图失败：' + error.message);
            }
        }

        async function generateCoverPromptWithZhipuAI(prompt, apiKey) {
            const response = await fetch('https://open.bigmodel.cn/api/paas/v4/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'glm-4',
                    messages: [
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    max_tokens: 1000,
                    temperature: 0.8
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'API请求失败');
            }

            const data = await response.json();
            const coverPrompt = data.choices[0]?.message?.content || '';
            
            if (!coverPrompt) {
                throw new Error('未获取到提示词内容');
            }
            
            return coverPrompt.trim();
        }

        async function generateSummaryWithOpenAI(content, apiKey) {
            const prompt = `请根据以下文章内容，生成一个约200字的概述。概述应该简洁明了，突出文章的主要内容和主题。\n\n文章内容：\n${content.substring(0, 3000)}`;
            
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'gpt-3.5-turbo',
                    messages: [
                        {
                            role: 'user',
                            content: prompt
                        }
                    ],
                    max_tokens: 300,
                    temperature: 0.7
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'API请求失败');
            }

            const data = await response.json();
            const summary = data.choices[0]?.message?.content || '';
            
            if (!summary) {
                throw new Error('未获取到概述内容');
            }
            
            return summary.trim();
        }

        function generateSimpleSummary(content) {
            const sentences = content.split(/[。！？\n]/).filter(s => s.trim().length > 10);
            
            let summary = '';
            
            if (sentences.length > 0) {
                const firstSentences = sentences.slice(0, 3);
                let tempSummary = firstSentences.join('。');
                
                if (tempSummary.length > 200) {
                    tempSummary = tempSummary.substring(0, 200);
                    const lastPeriod = tempSummary.lastIndexOf('。');
                    if (lastPeriod !== -1) {
                        tempSummary = tempSummary.substring(0, lastPeriod + 1);
                    }
                }
                
                summary = tempSummary;
                if (!summary.endsWith('。')) {
                    summary += '。';
                }
            } else {
                summary = '本文内容暂无足够信息生成概述。';
            }
            
            return summary;
        }

        function saveAllToTxt() {
            if (chapters.length === 0) {
                alert('没有可保存的内容');
                return;
            }

            const bookTitle = document.getElementById('book-title').value || '未命名书籍';
            const author = document.getElementById('author').value || '佚名';

            let txtContent = '';
            
            txtContent += `${bookTitle}\n`;
            txtContent += `作者：${author}\n`;
            txtContent += `\n`;
            txtContent += `==================\n`;
            txtContent += `\n`;

            chapters.forEach((ch, index) => {
                txtContent += `${ch.title}\n`;
                txtContent += `\n`;
                txtContent += ch.content;
                txtContent += `\n\n`;
                
                if (index < chapters.length - 1) {
                    txtContent += `==================\n`;
                    txtContent += `\n`;
                }
            });

            const blob = new Blob([txtContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${bookTitle}.txt`;
            a.click();
            URL.revokeObjectURL(url);

            alert('文件已保存');
        }

        function removeEmptyLines() {
            if (chapters.length === 0) {
                alert('没有可处理的内容');
                return;
            }

            if (!confirm('确定要删除所有空行吗？\n\n这将删除所有章节中只包含标点符号的行。')) {
                return;
            }

            let removedCount = 0;
            const punctuationMarks = ['。', '！', '？', '，', '；', '：', '、', '！', '？', '，', '；', '：', '、', '"', '"', "'", "'", '（', '）', '(', ')', '【', '】', '[', ']', '《', '》', '<', '>', '「', '」', '『', '』'];
            
            chapters.forEach(chapter => {
                const lines = chapter.content.split('\n');
                const nonEmptyLines = lines.filter(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return false;
                    
                    const isOnlyPunctuation = trimmed.split('').every(char => punctuationMarks.includes(char));
                    const isEllipsis = trimmed === '…' || trimmed === '……';
                    
                    return !isOnlyPunctuation || isEllipsis;
                });
                removedCount += (lines.length - nonEmptyLines.length);
                chapter.content = nonEmptyLines.join('\n');
            });

            updateChapterList();
            if (highlightedChapter) {
                selectChapter(highlightedChapter);
            }

            alert(`已删除 ${removedCount} 个空行`);
        }

        function showFindReplace() {
            document.getElementById('find-replace-bar').classList.remove('hidden');
            document.getElementById('find-input').focus();
        }

        function hideFindReplace() {
            document.getElementById('find-replace-bar').classList.add('hidden');
            document.getElementById('find-input').value = '';
            document.getElementById('replace-input').value = '';
            matches = [];
            currentMatchIndex = -1;
        }

        function findNextInEditMode() {
            const findInput = document.getElementById('find-input');
            const searchText = findInput.value.trim();
            
            if (!searchText) return;
            
            const textarea = document.getElementById('edit-textarea');
            if (!textarea) {
                alert('请先进入编辑模式');
                return;
            }
            
            const text = textarea.value;
            
            if (matches.length === 0 || currentMatchIndex === -1) {
                matches = [];
                let match;
                const escapedText = searchText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const regex = new RegExp(escapedText, 'gi');
                while ((match = regex.exec(text)) !== null) {
                    matches.push(match.index);
                }
            }
            
            if (matches.length === 0) {
                alert('未找到匹配项');
                return;
            }
            
            currentMatchIndex = (currentMatchIndex + 1) % matches.length;
            highlightMatch(textarea, matches[currentMatchIndex], searchText.length);
        }

        function replaceCurrent() {
            const findInput = document.getElementById('find-input');
            const replaceInput = document.getElementById('replace-input');
            const searchText = findInput.value.trim();
            const replaceText = replaceInput.value;
            
            if (!searchText || currentMatchIndex === -1) {
                alert('请先查找要替换的内容');
                return;
            }
            
            const textarea = document.getElementById('edit-textarea');
            if (!textarea) return;
            
            const text = textarea.value;
            const matchIndex = matches[currentMatchIndex];
            
            const newText = text.substring(0, matchIndex) + replaceText + text.substring(matchIndex + searchText.length);
            textarea.value = newText;
            
            matches = [];
            currentMatchIndex = -1;
            
            findNextInEditMode();
        }

        function replaceAll() {
            const findInput = document.getElementById('find-input');
            const replaceInput = document.getElementById('replace-input');
            const searchText = findInput.value.trim();
            const replaceText = replaceInput.value;
            
            if (!searchText) {
                alert('请输入要查找的内容');
                return;
            }
            
            const textarea = document.getElementById('edit-textarea');
            if (!textarea) {
                alert('请先进入编辑模式');
                return;
            }
            
            const regex = new RegExp(searchText.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
            const newText = textarea.value.replace(regex, replaceText);
            textarea.value = newText;
            
            matches = [];
            currentMatchIndex = -1;
            
            alert(`已替换 ${textarea.value.split(regex).length - 1} 处`);
        }

        function highlightMatch(textarea, startIndex, length) {
            textarea.focus();
            textarea.setSelectionRange(startIndex, startIndex + length);
            textarea.scrollTop = textarea.value.substring(0, startIndex).split('\n').length * 20;
        }

        window.addEventListener('DOMContentLoaded', function() {
            renderCover();
            updateAIConfig();
        });
    </script>
