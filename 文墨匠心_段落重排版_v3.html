<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文墨匠心 - TXT转EPUB工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-[#fcfbf9] text-stone-800 p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <aside class="lg:col-span-3 space-y-5 lg:sticky lg:top-4 lg:self-start" style="max-height: calc(100vh - 2rem); overflow-y: auto; overflow-x: hidden;">
            <header class="flex items-center gap-3 mb-2">
                <div class="bg-stone-900 p-2.5 rounded-2xl shadow-lg">
                    <svg class="text-white w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <h1 class="text-xl font-black font-serif tracking-tight">文墨匠心——段落重排</h1>
            </header>

            <div id="error-message" class="hidden bg-red-50 border border-red-100 text-red-600 p-3 rounded-xl text-xs font-bold flex items-center gap-2">
                <span id="error-text"></span>
                <button onclick="clearError()" class="ml-auto">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <section class="bg-white p-4 rounded-xl border border-stone-100 shadow-sm space-y-3">
                <h2 class="text-[10px] font-black text-stone-300 uppercase tracking-widest">稿件详情</h2>
                <div id="upload-section">
                    <label class="block border-2 border-dashed border-stone-100 rounded-2xl p-6 text-center cursor-pointer hover:bg-stone-50 transition-all group">
                        <input type="file" accept=".txt" class="hidden" id="file-input" onchange="handleFileUpload(event)">
                        <svg class="w-6 h-6 mx-auto mb-2 text-stone-300 group-hover:text-stone-900 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                        <p class="text-xs font-bold text-stone-400">导入 TXT 手稿</p>
                    </label>
                </div>
                <div id="file-info" class="hidden">
                    <div class="flex items-center justify-between bg-stone-50 p-3 rounded-xl border border-stone-100">
                        <span class="text-xs font-bold truncate flex-1" id="file-name"></span>
                        <button onclick="clearFile()" class="text-stone-400 hover:text-red-400 p-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="space-y-2">
                    <input type="text" id="book-title" oninput="renderCover()" class="w-full bg-stone-50 border-none rounded-xl text-xs p-3 font-serif focus:ring-1 ring-stone-200" placeholder="书名">
                    <input type="text" id="author" oninput="renderCover()" class="w-full bg-stone-50 border-none rounded-xl text-xs p-3 font-serif focus:ring-1 ring-stone-200" placeholder="作者" value="佚名">
                    <div class="space-y-1">
                        <select id="ai-type" onchange="updateAIConfig()" class="w-full bg-stone-50 border-none rounded-xl text-xs p-3 font-serif focus:ring-1 ring-stone-200">
                            <option value="zhipu" selected>智谱AI (GLM-4)</option>
                            <option value="openai">OpenAI (GPT-3.5/GPT-4)</option>
                            <option value="simple">简单方法（提取前几句）</option>
                        </select>
                        <input type="password" id="api-key" value="95dc3a85101c457084a7dcb96d185524.951Fb5OPlAXPO8nT" class="hidden w-full bg-stone-50 border-none rounded-xl text-xs p-3 font-serif focus:ring-1 ring-stone-200" placeholder="请输入API密钥">
                    </div>
                </div>
                <div id="action-buttons" class="hidden space-y-2">
                    <div class="flex items-center gap-2 px-2">
                        <input type="checkbox" id="add-indent" class="w-4 h-4 rounded border-stone-300 text-stone-900 focus:ring-stone-900" checked>
                        <label for="add-indent" class="text-xs font-bold text-stone-600">段落重排时添加首行缩进</label>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="handleReflowParagraphs()" class="w-full px-4 py-3 bg-white border-2 border-stone-200 text-stone-700 rounded-xl text-xs font-black flex items-center justify-center gap-2 hover:bg-stone-50 hover:border-stone-300 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                            </svg>
                            段落重排
                        </button>
                        <button onclick="handleToggleTraditional()" id="toggle-traditional-btn" class="w-full px-4 py-3 bg-white border-2 border-stone-200 text-stone-700 rounded-xl text-xs font-black flex items-center justify-center gap-2 hover:bg-stone-50 hover:border-stone-300 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>
                            </svg>
                            <span id="toggle-traditional-text">切换繁体</span>
                        </button>
                        <button onclick="handleExport()" id="export-btn" class="w-full bg-stone-900 text-white px-4 py-3 rounded-xl text-xs font-black flex items-center justify-center gap-2 hover:bg-stone-800 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                            </svg>
                            <span id="export-text">导出 EPUB</span>
                        </button>
                        <button onclick="handleExportTxt()" id="export-txt-btn" class="w-full px-4 py-3 bg-white border-2 border-stone-200 text-stone-700 rounded-xl text-xs font-black flex items-center justify-center gap-2 hover:bg-stone-50 hover:border-stone-300 transition-all">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            <span id="export-txt-text">导出 TXT</span>
                        </button>
                    </div>
                    <button id="restore-button" onclick="restoreLastDeleted()" class="hidden w-full px-4 py-2 bg-green-100 text-green-700 rounded-xl text-xs font-black flex items-center justify-center gap-2 hover:bg-green-200 transition-all">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/>
                        </svg>
                        恢复删除的章节
                    </button>
                </div>
            </section>

            <section class="bg-white p-4 rounded-xl border border-stone-100 shadow-sm space-y-3">
                <h2 class="text-[10px] font-black text-stone-300 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                    </svg>
                    章节 (<span id="chapter-count">0</span>)
                    <button onclick="jumpToFirstSuspicious()" id="suspicious-count-btn" class="hidden px-2 py-1 bg-red-100 text-red-600 text-[9px] font-black rounded-full hover:bg-red-200 transition-colors">
                        可疑: <span id="suspicious-count">0</span>
                    </button>
                    <button onclick="jumpToFirstMissing()" id="missing-count-btn" class="hidden px-2 py-1 bg-orange-100 text-orange-600 text-[9px] font-black rounded-full hover:bg-orange-200 transition-colors">
                        漏识别: <span id="missing-count">0</span>
                    </button>
                    <div class="flex items-center gap-1">
                        <button onclick="jumpToFirstChapter()" class="p-1 text-stone-400 hover:text-stone-600 transition-colors font-bold text-sm" title="跳转到第一个章节">
                            ↑
                        </button>
                        <button onclick="jumpToLastChapter()" class="p-1 text-stone-400 hover:text-stone-600 transition-colors font-bold text-sm" title="跳转到最后一个章节">
                            ↓
                        </button>
                        <button onclick="confirmAllSuspicious()" id="confirm-suspicious-btn" class="p-1 text-green-600 hover:text-green-700 transition-colors font-bold text-sm" title="确认所有可疑章节">
                            ✓
                        </button>
                        <button onclick="deleteAllSuspicious()" id="delete-suspicious-btn" class="p-1 text-red-600 hover:text-red-700 transition-colors font-bold text-sm" title="删除所有可疑章节">
                            ✗
                        </button>
                    </div>
                </h2>
                <div id="chapter-list-nav" class="hidden flex justify-between items-center mb-3 px-3 py-2 bg-stone-50 rounded-lg">
                    <button onclick="navigateToChapterList(-1)" class="p-1 text-stone-400 hover:text-stone-600 transition-colors font-bold text-base" title="上一章">
                        ←
                    </button>
                    <span id="current-chapter-title" class="text-xs font-bold font-serif text-stone-800 flex-1 text-center"></span>
                    <button onclick="navigateToChapterList(1)" class="p-1 text-stone-400 hover:text-stone-600 transition-colors font-bold text-base" title="下一章">
                        →
                    </button>
                </div>
                <div id="chapter-list" class="space-y-2 max-h-[400px] overflow-y-auto custom-scrollbar">
                </div>
            </section>
        </aside>

        <main class="lg:col-span-9 space-y-5">
            <div class="grid grid-cols-1 gap-6 w-full" style="grid-template-columns: 4fr 6fr;">
                <div class="space-y-5">
                    <section class="bg-white p-4 rounded-xl border border-stone-100 shadow-sm space-y-4">
                        <h2 class="text-[10px] font-black text-stone-300 uppercase tracking-widest flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                            </svg>
                            封面排版设计
                        </h2>
                        <div class="grid grid-cols-1 gap-6">
                            <div class="space-y-3 pb-3 border-b border-stone-50">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-stone-500 uppercase">书名配置</span>
                                    <button onclick="toggleTitleVertical()" id="title-vertical-btn" class="px-3 py-1 rounded-full text-[9px] font-black transition-all bg-stone-100 text-stone-400">
                                        横排
                                    </button>
                                </div>
                                <div class="flex gap-4 items-end">
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>X</span></div>
                                        <input type="range" min="0" max="450" value="225" id="title-x" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>Y</span></div>
                                        <input type="range" min="0" max="600" value="180" id="title-y" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>第一行大小</span></div>
                                        <input type="range" min="10" max="100" value="48" id="title-size1" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>第二行大小</span></div>
                                        <input type="range" min="10" max="100" value="48" id="title-size2" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-3 pb-3 border-b border-stone-50">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-stone-500 uppercase">作者配置</span>
                                    <button onclick="toggleAuthorVertical()" id="author-vertical-btn" class="px-3 py-1 rounded-full text-[9px] font-black transition-all bg-stone-100 text-stone-400">
                                        横排
                                    </button>
                                </div>
                                <div class="flex gap-4 items-end">
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>X</span></div>
                                        <input type="range" min="0" max="450" value="225" id="author-x" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>Y</span></div>
                                        <input type="range" min="0" max="600" value="450" id="author-y" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                    <div class="flex-1 space-y-1">
                                        <div class="flex justify-between text-[7px] font-bold text-stone-400 uppercase"><span>大小</span></div>
                                        <input type="range" min="10" max="60" value="22" id="author-size" oninput="updateCoverLayout()" class="w-full h-1 bg-stone-100 accent-stone-900 appearance-none rounded-full">
                                    </div>
                                </div>
                            </div>

                            <div class="space-y-3">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-stone-500 uppercase">显示设置</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="show-title" checked onchange="updateCoverLayout()" class="w-4 h-4 rounded border-stone-300 text-stone-900 focus:ring-stone-900">
                                        <span class="text-xs font-bold text-stone-600">显示书名</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="show-author" checked onchange="updateCoverLayout()" class="w-4 h-4 rounded border-stone-300 text-stone-900 focus:ring-stone-900">
                                        <span class="text-xs font-bold text-stone-600">显示作者</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white p-4 rounded-xl border border-stone-100 shadow-sm space-y-3">
                        <div class="flex items-center justify-between">
                            <h2 class="text-[10px] font-black text-stone-300 uppercase tracking-widest">背景设置</h2>
                            <div class="flex gap-1">
                                <label class="text-[9px] font-black text-stone-600 hover:text-stone-700 flex items-center gap-1 cursor-pointer">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                                    </svg>
                                    导入背景
                                    <input type="file" accept="image/*" class="hidden" id="bg-input" onchange="handleImportBackground(event)">
                                </label>
                                <select id="bg-scale-mode" onchange="updateBgScaleMode()" class="text-[9px] font-black text-stone-600 bg-transparent border-none outline-none cursor-pointer">
                                    <option value="cover">铺满</option>
                                    <option value="contain">保持比例</option>
                                </select>
                                <button onclick="generateAICoverPrompt()" class="text-[9px] font-black text-stone-600 hover:text-stone-700 flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
                                    </svg>
                                    AI提示词
                                </button>
                                <button onclick="generateAICoverImage()" class="text-[9px] font-black text-stone-600 hover:text-stone-700 flex items-center gap-1">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                                    </svg>
                                    AI生成封面
                                </button>
                            </div>
                        </div>
                        <div class="flex gap-2 flex-wrap">
                            <button onclick="setBgColor('#1a365d')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #1a365d;"></button>
                            <button onclick="setBgColor('#744210')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #744210;"></button>
                            <button onclick="setBgColor('#234e52')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #234e52;"></button>
                            <button onclick="setBgColor('#553c9a')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #553c9a;"></button>
                            <button onclick="setBgColor('#702459')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #702459;"></button>
                            <button onclick="setBgColor('#285e61')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #285e61;"></button>
                            <button onclick="setBgColor('#1a202c')" class="w-10 h-10 rounded-full border-2 border-transparent transition-all hover:scale-110 hover:border-stone-300" style="background-color: #1a202c;"></button>
                        </div>
                    </section>

                    <div class="flex flex-col items-center gap-4">
                        <div class="relative p-4 bg-stone-100 rounded-xl shadow-inner w-full">
                            <canvas id="cover-canvas" width="450" height="600" class="w-full shadow-2xl rounded-[4px]"></canvas>
                        </div>
                        <p class="text-[10px] font-black text-stone-300 uppercase tracking-widest flex items-center gap-2">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0010.07 2.12V6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm10-3.09V14.5a3.5 3.5 0 11-7 0V9.91a3.5 3.5 0 017 0z"/>
                            </svg>
                            封面效果预览 (含印章)
                        </p>
                    </div>
                </div>

                <div class="bg-white rounded-xl border border-stone-100 shadow-sm flex flex-col overflow-hidden relative" style="height: calc(900px + 32px + 16px + 24px);">
                    <div class="sticky top-0 z-10 bg-white">
                        <div id="preview-toolbar" class="flex items-center justify-between px-4 py-3 border-b border-stone-100 bg-stone-50 shrink-0">
                            <div class="flex items-center gap-2">
                                <button onclick="toggleEditMode()" id="edit-mode-btn" class="px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-200 text-stone-600 hover:bg-stone-300">
                                    编辑模式
                                </button>
                                <button onclick="showFindReplace()" class="px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-200 text-stone-600 hover:bg-stone-300">
                                    查找替换
                                </button>
                                <button onclick="generateSummary()" class="px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-200 text-stone-600 hover:bg-stone-300">
                                    生成概述
                                </button>
                                <button onclick="saveAllToTxt()" class="px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-200 text-stone-600 hover:bg-stone-300">
                                    保存TXT
                                </button>
                                <button onclick="removeEmptyLines()" class="px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-200 text-stone-600 hover:bg-stone-300">
                                    删除空行
                                </button>
                            </div>
                            <button onclick="saveChapterContent()" id="save-btn" class="hidden px-3 py-1.5 rounded-lg text-[9px] font-black transition-all bg-stone-900 text-white hover:bg-stone-800">
                                保存
                            </button>
                        </div>
                        <div id="find-replace-bar" class="hidden px-4 py-3 border-b border-stone-100 bg-stone-50 shrink-0">
                            <div class="grid grid-cols-2 gap-4 mb-3">
                                <div>
                                    <label class="text-xs font-bold text-stone-500 mb-1 block">查找文本</label>
                                    <input type="text" id="find-input" placeholder="查找" oninput="clearFindMatches()" class="w-full px-3 py-1.5 rounded-lg text-[10px] border border-stone-200 focus:outline-none focus:ring-1 ring-stone-300">
                                </div>
                                <div>

        function detectEncoding(arrayBuffer) {
            const uint8Array = new Uint8Array(arrayBuffer);
            let text = "";
            let encoding = "UTF-8";
            
            try {
                const utf8Decoder = new TextDecoder('utf-8', { fatal: true });
                text = utf8Decoder.decode(uint8Array);
            } catch (err) {
                try {
                    const gbkDecoder = new TextDecoder('gb18030');
                    text = gbkDecoder.decode(uint8Array);
                    encoding = "GB18030";
                    console.log("检测到非 UTF-8 编码，已自动使用 GB18030 解析");
                } catch (err2) {
                    const gbkDecoder = new TextDecoder('gbk');
                    text = gbkDecoder.decode(uint8Array);
                    encoding = "GBK";
                    console.log("检测到非 UTF-8 编码，已自动使用 GBK 解析");
                }
            }
            
            console.log("文件编码:", encoding);
            
            return { text, encoding };
        }

        function extractMetadata(content, fileName) {
            // 1. 处理文件名：去除所有 .txt 后缀，去除常见的版本描述
            let rawName = fileName.replace(/\.txt$/gi, '').replace(/\.txt$/gi, '')
                                .replace(/(精校版|校对版|全本|下载).*$/i, '').trim();
            
            let detectedTitle = '';
            let detectedAuthor = '';

            // 2. 识别符号内的内容：《》、[]、【】
            // 排除类似 [第xx章] 或 [01] 这种可能是章节号的情况
            const symbolRegex = /[《【\[]([^》\]】]+)[》\]】]/g;
            let match;
            const candidates = [];
            while ((match = symbolRegex.exec(rawName)) !== null) {
                const content = match[1].trim();
                // 如果内容不全是数字且不包含"第"字，认为是书名候选
                if (!/[\d\s]+$/.test(content) && !/^第.+[章节回]$/.test(content)) {
                    candidates.push({ full: match[0], text: content });
                }
            }

            if (candidates.length > 0) {
                detectedTitle = candidates[0].text;
                // 从剩余部分寻找作者
                rawName = rawName.replace(candidates[0].full, ' ').trim();
            }

            // 3. 从文件名剩余部分识别"作者"或"By"
            const authorPatterns = [
                /(?:作者|By|by)[:：\s]+([^\s\-_\+《》【\[\]]+)/i,
                /[:：\s\-]+([^\s\-_\+《》【\[\]]+)$/ // 结尾可能是作者
            ];

            for (const p of authorPatterns) {
                const am = rawName.match(p);
                if (am) {
                    detectedAuthor = am[1].trim();
                    rawName = rawName.replace(am[0], '').trim();
                    break;
                }
            }

            // 4. 如果书名还未确定，取剩余部分
            if (!detectedTitle) {
                const parts = rawName.split(/[\s\-_\+]+/);
                detectedTitle = parts[0] || '';
            }

            // 5. 如果书名还是空的，使用文件名（去除扩展名）
            if (!detectedTitle) {
                detectedTitle = fileName.replace(/\.txt$/gi, '').trim();
            }

            // 6. 作者回退逻辑：如果文件名没识别到作者，扫描正文前2000字
            let finalAuthor = detectedAuthor || '佚名';
            if (!finalAuthor || finalAuthor === '佚名') {
                const head = content.slice(0, 2000);
                const ap = [/作者[:：]\s*([^\s\n]+)/, /([^\s\n]+)\s*著/];
                finalAuthor = '佚名';
                for (let p of ap) {
                    const match = head.match(p);
                    if (match) { 
                        finalAuthor = match[1].replace(/[【\[\]《》]/g, '').trim(); 
                        break; 
                    }
                }
            }

            return { title: detectedTitle.trim() || '未命名书籍', author: finalAuthor };
        }

        function extractPrefaceMetadata(content) {
            // 获取前言部分的前3000字
            const prefaceText = content.slice(0, 3000);
            
            let detectedTitle = '';
            let detectedAuthor = '';

            // 1. 识别书名：查找《》、【】、[]等符号内的内容
            const titlePatterns = [
                /《([^》]+)》/,
                /【([^】]+)】/,
                /\[([^\]]+)\]/,
                /书籍名[:：]\s*([^\s\n]+)/,
                /书籍名称[:：]\s*([^\s\n]+)/,
                /书名[:：]\s*([^\s\n]+)/,
                /作品名[:：]\s*([^\s\n]+)/,
                /小说名[:：]\s*([^\s\n]+)/,
                /书籍[:：]\s*([^\s\n]+)/,
                /书[:：]\s*([^\s\n]+)/,
                /书名是[:：]\s*([^\s\n]+)/,
                /本书名[:：]\s*([^\s\n]+)/,
                /原著[:：]\s*([^\s\n]+)/,
                /小说[:：]\s*([^\s\n]+)/,
                /故事[:：]\s*([^\s\n]+)/
            ];

            for (const pattern of titlePatterns) {
                const match = prefaceText.match(pattern);
                if (match) {
                    const candidate = match[1].trim();
                    // 排除过短或过长的书名
                    if (candidate.length >= 2 && candidate.length <= 20) {
                        detectedTitle = candidate;
                        break;
                    }
                }
            }

            // 2. 识别作者：查找多种作者标识
            const authorPatterns = [
                /作者[:：]\s*([^\s\n\r]+)/,
                /著[:：]\s*([^\s\n\r]+)/,
                /([^\s\n\r]+)\s*著/,
                /([^\s\n\r]+)\s*编/,
                /([^\s\n\r]+)\s*译/,
                /([^\s\n\r]+)\s*整理/,
                /([^\s\n\r]+)\s*校/,
                /([^\s\n\r]+)\s*主编/,
                /([^\s\n\r]+)\s*编著/,
                /([^\s\n\r]+)\s*撰写/,
                /([^\s\n\r]+)\s*创作/,
                /([^\s\n\r]+)\s*执笔/,
                /([^\s\n\r]+)\s*原著/,
                /([^\s\n\r]+)\s*小说/
            ];

            for (const pattern of authorPatterns) {
                const match = prefaceText.match(pattern);
                if (match) {
                    let author = match[1].replace(/[【\[\]《》]/g, '').trim();
                    // 排除过短或过长的作者名
                    if (author.length >= 2 && author.length <= 10) {
                        // 排除一些常见的非作者词汇
                        const excludeKeywords = ['小说', '故事', '传说', '传奇', '传记', '纪实', '历史', '文学', '作品', '文集', '全集', '选集', '合集', '系列', '丛书', '章节', '目录', '序言', '前言', '后记', '附录', '说明', '简介', '内容', '摘要', '概述', '简介', '出版', '发行', '版本', '修订', '更新', '最新', '完整', '完结', '连载', '原创', '转载', '收藏', '推荐', '热门', '精品', '经典', '必读', '推荐'];
                        if (!excludeKeywords.includes(author)) {
                            detectedAuthor = author;
                            break;
                        }
                    }
                }
            }

            return { title: detectedTitle || '', author: detectedAuthor || '佚名' };
        }

        function parseChapters(text) {
            const lines = text.split(/\r?\n/);
            const parsedChapters = [];
            let currentContent = [];
            let currentTitle = "前言";
            
            console.log("开始解析章节，总行数:", lines.length);
            
            const patterns = [
                /^[\s\u3000\t]*第[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+[章节卷回][^\n]*/,
                /^[\s\u3000\t]*第[0-9０-９]+[章节卷回][^\n]*/,
                /^[\s\u3000\t]*[0-9０-９]+[、\.\s]/,
                /^[\s\u3000\t]*(序|序言|序章|引子|楔子|尾声|后记|结语|附录|番外)/,
                // 新增：支持没有"第"字的章节标题
                /^[\s\u3000\t]*[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+[章节卷回][^\n]*/,
                // 新增：支持"章"字开头的标题
                /^[\s\u3000\t]*[章节][\s\u3000\t]*[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+/,
                // 新增：支持更简单的数字加标点格式
                /^[\s\u3000\t]*[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+[、.\s　 \t]/,
                // 新增：支持带括号的章节标题
                /^[\s\u3000\t]*\([一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+\)|^[\s\u3000\t]*\[[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+\]/
            ];

            const excludeSuffixes = ['课', '部', '团', '军', '队', '排', '连', '旅', '师', '群', '案', '目', '体', '集', '营', '班', '组', '员', '人', '名', '地', '处', '点', '站', '场', '馆', '所', '门', '系', '级', '类', '型', '种', '项', '条', '款', '次', '局', '会', '议', '赛', '战', '役', '期', '季', '度', '月', '日', '年', '代', '纪', '世', '界', '国', '省', '市', '县', '区', '乡', '镇', '村', '街', '路', '道', '桥', '河', '湖', '海', '山', '岭', '峰', '谷', '原', '野', '田', '园', '林', '厂', '店', '铺', '章法', '章程', '章鱼', '章回', '章句', '章台', '章草'];

            const suspiciousKeywords = ['集团', '集群', '课堂', '课程', '部分', '部队', '军队', '军团', '团队', '群体', '班级', '年级', '部门', '门派', '阶段', '时期', '步骤', '环节', '方面', '领域', '地区', '区域', '地点', '场所', '位置', '部位', '章节说明', '章节目录', '章法', '章句', '章回体', '章台柳', '章草书'];

            lines.forEach((line) => {
                const trimmedLine = line.trim();
                let isChapter = false;
                
                if (trimmedLine.includes('廿') || trimmedLine.includes('卅')) {
                    console.log('检测到特殊数字行:', trimmedLine, '长度:', trimmedLine.length);
                    console.log('测试正则表达式1:', /^[\s\u3000\t]*第[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+[章节卷回][^\n]*/.test(trimmedLine));
                    console.log('测试正则表达式2:', /^[\s\u3000\t]*第[0-9０-９]+[章节卷回][^\n]*/.test(trimmedLine));
                    console.log('测试正则表达式5:', /^[\s\u3000\t]*[一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+[章节卷回][^\n]*/.test(trimmedLine));
                }
                
                for (const pattern of patterns) {
                    if (pattern.test(trimmedLine)) {
                        isChapter = true;
                        break;
                    }
                }

                if (isChapter) {
                    const chapterMatch = trimmedLine.match(/[章节卷回]/);
                    if (chapterMatch) {
                        const chapterIndex = trimmedLine.indexOf(chapterMatch[0]);
                        const nextChar = trimmedLine.charAt(chapterIndex + 1);

                        if (nextChar && excludeSuffixes.includes(nextChar)) {
                            console.log('被排除后缀过滤:', trimmedLine, 'nextChar:', nextChar);

                        const chapterSuffix = trimmedLine.substring(chapterIndex + 1);
                        const nonChapterKeywords = ['集团', '集群', '课堂', '课程', '部分', '部队', '军队', '军团', '团队', '群体', '班级', '年级', '部门', '门派', '章节说明', '章节目录', '章法', '章句', '章回体', '章台柳', '章草书'];
                        for (const keyword of nonChapterKeywords) {
                            if (chapterSuffix.startsWith(keyword)) {
                                console.log('被关键词过滤:', trimmedLine, 'keyword:', keyword, 'chapterSuffix:', chapterSuffix);
                                isChapter = false;
                                break;
                            }
                        }
                    }

                    if (trimmedLine.length > 60) {
                        console.log('被长度过滤:', trimmedLine, 'length:', trimmedLine.length);
                        isChapter = false;
                    }
                    
                    if (trimmedLine.includes('91章') || trimmedLine.includes('92章') || trimmedLine.includes('93章') || trimmedLine.includes('94章') || trimmedLine.includes('95章') || trimmedLine.includes('96章') || trimmedLine.includes('97章') || trimmedLine.includes('98章') || trimmedLine.includes('99章') || trimmedLine.includes('100章')) {
                        console.log('检测到90+章节:', trimmedLine, 'isChapter:', isChapter);
                    }
                }

                if (isChapter) {
                    if (currentContent.length > 0 || currentTitle !== "前言") {
                        const contentStr = currentContent.join('\n');
                        const summary = currentContent.find(l => l.trim().length > 0) || "";
                        
                        let isSuspicious = false;
                        for (const keyword of suspiciousKeywords) {
                            if (currentTitle.includes(keyword)) {
                                isSuspicious = true;
                                break;
                            }
                        }
                        
                        parsedChapters.push({
                            id: Math.random().toString(36).substr(2, 9),
                            title: currentTitle,
                            content: contentStr,
                            summary: summary.slice(0, 60) + (summary.length > 60 ? "..." : ""),
                            isSuspicious: isSuspicious
                        });
                    }
                    currentTitle = trimmedLine;
                    currentContent = [];
                } else {
                    currentContent.push(line);
                }
            });
            
            const lastContentStr = currentContent.join('\n');
            const lastSummary = currentContent.find(l => l.trim().length > 0) || "";
            
            let lastIsSuspicious = false;
            for (const keyword of suspiciousKeywords) {
                if (currentTitle.includes(keyword)) {
                    lastIsSuspicious = true;
                    break;
                }
            }
            
            parsedChapters.push({
                id: Math.random().toString(36).substr(2, 9),
                title: currentTitle,
                content: lastContentStr,
                summary: lastSummary.slice(0, 60) + (lastSummary.length > 60 ? "..." : ""),
                isSuspicious: lastIsSuspicious
            });

            chapters = parsedChapters;
            updateChapterList();
            document.getElementById('action-buttons').classList.remove('hidden');
            document.getElementById('chapter-navigation').classList.add('hidden');
            
            checkChapterSequence();
            
            if (chapters.length > 0) {
                selectChapter(chapters[0].id);
            }
        }

        function checkChapterSequence() {
            const sequenceWarnings = [];
            
            const chapterNumberPattern = /第([一二三四五六七八九十百千万零0-9０-９两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+)[章节卷回]/;
            
            let lastNumber = null;
            let lastNumberType = null;
            let lastChapterIndex = -1;
            
            chapters.forEach((chapter, index) => {
                const match = chapter.title.match(chapterNumberPattern);
                
                if (match) {
                    const numberStr = match[1];
                    const number = convertChineseNumber(numberStr);
                    const numberType = detectNumberType(numberStr);
                    
                    if (lastNumber !== null && lastNumberType === numberType) {
                        const expectedNumber = lastNumber + 1;
                        
                        if (number !== expectedNumber) {
                            const gap = number - expectedNumber;
                            if (gap > 0) {
                                sequenceWarnings.push({
                                    type: 'gap',
                                    prevIndex: lastChapterIndex,
                                    currentIndex: index,
                                    prevNumber: lastNumber,
                                    currentNumber: number,
                                    gap: gap,
                                    message: `章节编号不连续：第${convertToChineseNumber(lastNumber)}章到第${convertToChineseNumber(number)}章之间缺少${gap}章（第${convertToChineseNumber(expectedNumber)}章等）`
                                });
                                
                                chapters[index].isMissingChapter = true;
                                chapters[index].missingInfo = {
                                    prevChapterIndex: lastChapterIndex,
                                    missingNumbers: Array.from({length: gap}, (_, i) => expectedNumber + i)
                                };
                            }
                        }
                    }
                    
                    lastNumber = number;
                    lastNumberType = numberType;
                    lastChapterIndex = index;
                }
            });
            
            if (sequenceWarnings.length > 0) {
                const missingChapters = chapters.filter(ch => ch.isMissingChapter);
                const missingCount = missingChapters.length;
                
                showError(`检测到${missingCount}个疑似漏识别章节，建议检查章节标题格式是否正确。`);
            }
        }

        function convertChineseNumber(numStr) {
            const chineseNums = {
                '零': 0, '一': 1, '二': 2, '三': 3, '四': 4, '五': 5,
                '六': 6, '七': 7, '八': 8, '九': 9, '十': 10,
                '百': 100, '千': 1000, '万': 10000,
                // 大写数字
                '壹': 1, '贰': 2, '叁': 3, '肆': 4, '伍': 5,
                '陆': 6, '柒': 7, '捌': 8, '玖': 9, '拾': 10,
                '佰': 100, '仟': 1000,
                // 特殊数字
                '两': 2, '廿': 20, '卅': 30
            };
            
            const arabicNums = {
                '０': 0, '１': 1, '２': 2, '３': 3, '４': 4, '５': 5,
                '６': 6, '７': 7, '８': 8, '９': 9
            };
            
            if (/^[0-9]+$/.test(numStr)) {
                return parseInt(numStr);
            }
            
            if (/^[０-９]+$/.test(numStr)) {
                let result = '';
                for (const char of numStr) {
                    result += arabicNums[char] !== undefined ? arabicNums[char] : char;
                }
                return parseInt(result);
            }
            
            // 特殊处理：廿x 表示二十多，卅x 表示三十多
            if (numStr.startsWith('廿')) {
                const rest = numStr.substring(1);
                if (rest && /^[一二三四五六七八九十]$/.test(rest)) {
                    return 20 + convertChineseNumber(rest);
                } else if (rest && /^[1-9]$/.test(rest)) {
                    return 20 + parseInt(rest);
                }
                return 20;
            }
            
            if (numStr.startsWith('卅')) {
                const rest = numStr.substring(1);
                if (rest && /^[一二三四五六七八九十]$/.test(rest)) {
                    return 30 + convertChineseNumber(rest);
                } else if (rest && /^[1-9]$/.test(rest)) {
                    return 30 + parseInt(rest);
                }
                return 30;
            }
            
            let result = 0;
            let temp = 0;
            
            for (let i = 0; i < numStr.length; i++) {
                const char = numStr[i];
                const value = chineseNums[char];
                
                if (value === undefined) continue;
                
                if (value >= 10) {
                    if (temp > 0) {
                        result += temp * value;
                        temp = 0;
                    } else {
                        result += value;
                    }
                } else {
                    temp = value;
                }
            }
            
            result += temp;
            return result;
        }

        function convertToChineseNumber(num) {
            if (num <= 10) {
                const chinese = ['零', '一', '二', '三', '四', '五', '六', '七', '八', '九', '十'];
                return chinese[num];
            }
            
            if (num < 20) {
                return '十' + (num % 10 > 0 ? convertToChineseNumber(num % 10) : '');
            }
            
            if (num < 100) {
                const tens = Math.floor(num / 10);
                const units = num % 10;
                return convertToChineseNumber(tens) + '十' + (units > 0 ? convertToChineseNumber(units) : '');
            }
            
            return num.toString();
        }

        function detectNumberType(numStr) {
            if (/^[一二三四五六七八九十百千万零两壹贰叁肆伍陆柒捌玖拾佰仟卅廿]+$/.test(numStr)) {
                return 'chinese';
            }
            if (/^[0-9]+$/.test(numStr)) {
                return 'arabic';
            }
            if (/^[０-９]+$/.test(numStr)) {
                return 'fullwidth';
            }
            return 'mixed';
        }

                div.setAttribute('data-chapter-id', chapter.id);
                div.className = `p-3 rounded-xl cursor-pointer transition-all ${highlightedChapter === chapter.id ? 'bg-stone-900 text-white' : isSuspicious ? 'bg-red-50 hover:bg-red-100 border border-red-200' : isMissing ? 'bg-orange-50 hover:bg-orange-100 border border-orange-200' : 'bg-stone-50 hover:bg-stone-100'}`;
                div.onclick = (e) => {

        function navigateToChapter(index) {

                selectChapter(chapters[index].id);

        function navigateToChapterList(direction) {

            const newIndex = chapterIndex + direction;
            if (newIndex >= 0 && newIndex < chapters.length) {

        function jumpToFirstSuspicious() {

        function confirmAllSuspicious() {
            const suspiciousChapters = chapters.filter(ch => ch.isSuspicious);
            if (suspiciousChapters.length === 0) {
                alert('没有可疑章节');
                return;

            if (!confirm(`确定要确认 ${suspiciousChapters.length} 个可疑章节吗？`)) {
                return;

            suspiciousChapters.forEach(ch => {
                ch.isSuspicious = false;

            updateChapterList();

        function deleteAllSuspicious() {
            const suspiciousChapters = chapters.filter(ch => ch.isSuspicious);
            if (suspiciousChapters.length === 0) {
                alert('没有可疑章节');
                return;
            }
            
            if (!confirm(`确定要删除 ${suspiciousChapters.length} 个可疑章节吗？`)) {
                return;
            }
            
            chapters = chapters.filter(ch => !ch.isSuspicious);
            updateChapterList();
            
            if (highlightedChapter && !chapters.find(ch => ch.id === highlightedChapter)) {
                highlightedChapter = null;

                document.getElementById('chapter-list-nav').classList.add('hidden');

        let selectedText = null;
        let selectedTextRange = null;

        function handleTextSelection() {
            const selection = window.getSelection();
            const addChapterBtn = document.getElementById('add-chapter-from-selection-btn');
            
            if (selection.toString().trim().length > 0) {
                selectedText = selection.toString().trim();
                addChapterBtn.classList.remove('hidden');
            } else {
                selectedText = null;
                addChapterBtn.classList.add('hidden');
            }
        }

        function addChapterFromSelection() {
            if (!selectedText || !highlightedChapter) {
                alert('请先选择文本');
                return;
            }
            
            const currentChapter = chapters.find(ch => ch.id === highlightedChapter);
            if (!currentChapter) return;
            
            const editableContent = document.getElementById('editable-content');
            const selection = window.getSelection();
            
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                const selectedNode = range.startContainer;
                
                const allTextNodes = [];
                const walker = document.createTreeWalker(
                    editableContent,
                    NodeFilter.SHOW_TEXT,
                    null,
                    false
                );
                
                let node;
                while (node = walker.nextNode()) {
                    allTextNodes.push(node);
                }
                
                let splitIndex = -1;
                let accumulatedText = '';
                
                for (let i = 0; i < allTextNodes.length; i++) {
                    const textNode = allTextNodes[i];
                    
                    if (textNode === selectedNode || textNode.contains(selectedNode)) {
                        splitIndex = i;
                        break;
                    }
                    
                    accumulatedText += textNode.textContent;
                }
                
                if (splitIndex === -1) {
                    alert('无法确定分割位置');
                    return;
                }
                
                const paragraphs = currentChapter.content.split('\n').filter(p => p.trim());
                let splitParaIndex = -1;
                
                for (let i = 0; i < paragraphs.length; i++) {
                    if (paragraphs[i].includes(selectedText)) {
                        splitParaIndex = i;
                        break;
                    }
                }
                
                if (splitParaIndex === -1) {
                    const allParaText = paragraphs.join('\n');
                    const textIndex = allParaText.indexOf(selectedText);
                    if (textIndex !== -1) {
                        let charCount = 0;
                        for (let i = 0; i < paragraphs.length; i++) {
                            if (charCount + paragraphs[i].length >= textIndex) {
                                splitParaIndex = i;
                                break;
                            }
                            charCount += paragraphs[i].length + 1;
                        }
                    }
                }
                
                if (splitParaIndex === -1) {
                    alert('无法确定分割位置');
                    return;
                }
                
                const newChapterTitle = selectedText;
                const currentContent = paragraphs.slice(0, splitParaIndex).join('\n');
                const newContent = paragraphs.slice(splitParaIndex).join('\n');
                
                const newChapterId = 'chapter_' + Date.now();
                const newChapter = {
                    id: newChapterId,
                    title: newChapterTitle,
                    content: newContent,
                    summary: newContent.split('\n').find(l => l.trim().length > 0) || "",
                    isSuspicious: false
                };
                
                const currentChapterIndex = chapters.findIndex(ch => ch.id === highlightedChapter);
                currentChapter.content = currentContent;
                const summary = currentContent.split('\n').find(l => l.trim().length > 0) || "";
                currentChapter.summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");
                
                chapters.splice(currentChapterIndex + 1, 0, newChapter);
                
                window.getSelection().removeAllRanges();
                selectedText = null;
                document.getElementById('add-chapter-from-selection-btn').classList.add('hidden');
                
                updateChapterList();
                selectChapter(newChapterId);
            }
        }

        function selectChapter(chapterId) {
            highlightedChapter = chapterId;
            updateChapterList();
            
            const chapter = chapters.find(ch => ch.id === chapterId);
            if (chapter) {
                const chapterIndex = chapters.findIndex(ch => ch.id === chapterId);
                const prevChapter = chapterIndex > 0 ? chapters[chapterIndex - 1] : null;
                const nextChapter = chapterIndex < chapters.length - 1 ? chapters[chapterIndex + 1] : null;

                const navDiv = document.getElementById('chapter-navigation');
                navDiv.classList.remove('hidden');
                const chapterTitleDisplay = document.getElementById('chapter-title-display');
                chapterTitleDisplay.textContent = chapter.title;
                chapterTitleDisplay.style.fontSize = `${contentLayout.chapterTitleFontSize}px`;
                
                const chapterListNav = document.getElementById('chapter-list-nav');
                chapterListNav.classList.remove('hidden');
                document.getElementById('current-chapter-title').textContent = chapter.title;
                
                const prevBtn = document.getElementById('prev-chapter-btn');
                const nextBtn = document.getElementById('next-chapter-btn');
                
                if (prevChapter) {
                    prevBtn.disabled = false;
                    prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    prevBtn.onclick = () => selectChapter(prevChapter.id);
                } else {
                    prevBtn.disabled = true;
                    prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    prevBtn.onclick = null;
                }
                
                if (nextChapter) {
                    nextBtn.disabled = false;
                    nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                    nextBtn.onclick = () => selectChapter(nextChapter.id);
                } else {
                    nextBtn.disabled = true;
                    nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    nextBtn.onclick = null;
                }

                renderPreviewContent();
                
                setTimeout(() => {
                    const previewContent = document.getElementById('preview-content');
                    if (previewContent) {
                        previewContent.scrollTop = 0;
                    }
                }, 50);
            }
        }

        function navigateChapter(direction) {
            const chapterIndex = chapters.findIndex(ch => ch.id === highlightedChapter);
            if (chapterIndex === -1) return;

            const newIndex = chapterIndex + direction;
            if (newIndex >= 0 && newIndex < chapters.length) {
                selectChapter(chapters[newIndex].id);
            }
        }

        let editingChapterId = null;
        let originalTitle = '';
        let originalContent = '';

        function openEditChapter(chapterId) {
            const chapter = chapters.find(ch => ch.id === chapterId);
            if (!chapter) return;

            editingChapterId = chapterId;
            originalTitle = chapter.title;
            originalContent = chapter.content;

            document.getElementById('chapter-navigation').classList.add('hidden');
            document.getElementById('chapter-list-nav').classList.add('hidden');

            document.getElementById('preview-content').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="text-xs font-bold text-stone-500 mb-1 block">章节标题</label>
                        <input type="text" id="edit-title" value="${escapeHtml(chapter.title)}" class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-stone-300">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-stone-500 mb-1 block">章节内容</label>
                        <textarea id="edit-content" rows="36" class="w-full px-3 py-2 border border-stone-200 rounded-lg text-sm leading-relaxed font-serif whitespace-pre-wrap focus:outline-none focus:ring-2 focus:ring-300">${escapeHtml(chapter.content)}</textarea>
                    </div>
                    <div class="flex gap-2 justify-end">
                        <button onclick="cancelEditChapter()" class="px-4 py-2 bg-stone-100 text-stone-600 text-xs rounded-full hover:bg-stone-200 transition-colors">取消</button>
                        <button onclick="saveEditChapter()" class="px-4 py-2 bg-stone-900 text-white text-xs rounded-full hover:bg-stone-800 transition-colors">保存</button>
                    </div>
                </div>
            `;
        }

        function saveEditChapter() {
            if (!editingChapterId) return;

            const newTitle = document.getElementById('edit-title').value.trim();
            const newContent = document.getElementById('edit-content').value;

            if (!newTitle) {
                alert('章节标题不能为空');
                return;
            }

            const chapterIndex = chapters.findIndex(ch => ch.id === editingChapterId);
            if (chapterIndex !== -1) {
                chapters[chapterIndex].title = newTitle;
                chapters[chapterIndex].content = newContent;
                const summary = newContent.split('\n').find(l => l.trim().length > 0) || "";
                chapters[chapterIndex].summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");
                chapters[chapterIndex].isSuspicious = false;
            }

            editingChapterId = null;
            originalTitle = '';
            originalContent = '';

            updateChapterList();
            selectChapter(chapters[chapterIndex].id);

            const nextSuspicious = chapters.find(ch => ch.isSuspicious);
            if (nextSuspicious) {
                setTimeout(() => {
                    selectChapter(nextSuspicious.id);
                    setTimeout(() => {
                        const chapterElement = document.querySelector(`[data-chapter-id="${nextSuspicious.id}"]`);
                        if (chapterElement) {
                            chapterElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                }, 100);
            }
        }

        function cancelEditChapter() {
            if (!editingChapterId) return;

            editingChapterId = null;
            originalTitle = '';
            originalContent = '';

            const chapter = chapters.find(ch => ch.id === highlightedChapter);
            if (chapter) {
                selectChapter(chapter.id);
            }
        }

        function confirmChapter(chapterId) {
            const chapterIndex = chapters.findIndex(ch => ch.id === chapterId);
            if (chapterIndex !== -1) {
                chapters[chapterIndex].isSuspicious = false;
                updateChapterList();
            }

            const nextSuspicious = chapters.find(ch => ch.isSuspicious);
            if (nextSuspicious) {
                setTimeout(() => {
                    selectChapter(nextSuspicious.id);
                    setTimeout(() => {
                        const chapterElement = document.querySelector(`[data-chapter-id="${nextSuspicious.id}"]`);
                        if (chapterElement) {
                            chapterElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                }, 100);
            }
        }

        function locateToPrevChapter(chapterId) {
            const chapter = chapters.find(ch => ch.id === chapterId);
            if (chapter && chapter.missingInfo && chapter.missingInfo.prevChapterIndex !== undefined) {
                const prevChapterIndex = chapter.missingInfo.prevChapterIndex;
                if (prevChapterIndex >= 0 && prevChapterIndex < chapters.length) {
                    const prevChapter = chapters[prevChapterIndex];
                    selectChapter(prevChapter.id);
                    setTimeout(() => {
                        const chapterElement = document.querySelector(`[data-chapter-id="${prevChapter.id}"]`);
                        if (chapterElement) {
                            chapterElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                }
            }
        }

        function confirmMissingChapter(chapterId) {
            const chapterIndex = chapters.findIndex(ch => ch.id === chapterId);
            if (chapterIndex !== -1) {
                chapters[chapterIndex].isMissingChapter = false;
                delete chapters[chapterIndex].missingInfo;
                updateChapterList();
            }

            const nextMissing = chapters.find(ch => ch.isMissingChapter);
            if (nextMissing) {
                setTimeout(() => {
                    selectChapter(nextMissing.id);
                    setTimeout(() => {
                        const chapterElement = document.querySelector(`[data-chapter-id="${nextMissing.id}"]`);
                        if (chapterElement) {
                            chapterElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                }, 100);
            }

        let deletedChapters = [];

        function deleteChapter(chapterId) {
            const chapter = chapters.find(ch => ch.id === chapterId);
            if (!chapter) return;

            const chapterIndex = chapters.findIndex(ch => ch.id === chapterId);
            if (chapterIndex <= 0) {
                alert('无法删除第一个章节');
                return;
            }

            const prevChapter = chapters[chapterIndex - 1];
            const updatedContent = prevChapter.content + '\n\n' + chapter.content;

            deletedChapters.push({
                chapter: chapter,
                prevChapterId: prevChapter.id,
                prevContent: prevChapter.content
            });

            chapters = chapters.filter(ch => ch.id !== chapterId);
            const newPrevIndex = chapters.findIndex(ch => ch.id === prevChapter.id);
            if (newPrevIndex !== -1) {
                const summary = updatedContent.split('\n').find(l => l.trim().length > 0) || "";
                chapters[newPrevIndex].content = updatedContent;
                chapters[newPrevIndex].summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");
            }

            if (highlightedChapter === chapterId) {
                highlightedChapter = chapters[0].id;
            }

            updateChapterList();
            if (highlightedChapter) {
                selectChapter(highlightedChapter);
            }

            showRestoreButton();

            const nextSuspicious = chapters.find(ch => ch.isSuspicious);
            if (nextSuspicious) {
                setTimeout(() => {
                    selectChapter(nextSuspicious.id);
                    setTimeout(() => {
                        const chapterElement = document.querySelector(`[data-chapter-id="${nextSuspicious.id}"]`);
                        if (chapterElement) {
                            chapterElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 100);
                }, 100);
            }
        }

        function restoreLastDeleted() {
            if (deletedChapters.length === 0) return;

            const lastDeleted = deletedChapters.pop();
            const { chapter, prevChapterId, prevContent } = lastDeleted;

            const prevChapterIndex = chapters.findIndex(ch => ch.id === prevChapterId);
            if (prevChapterIndex !== -1) {
                chapters[prevChapterIndex].content = prevContent;
                const summary = prevContent.split('\n').find(l => l.trim().length > 0) || "";
                chapters[prevChapterIndex].summary = summary.slice(0, 60) + (summary.length > 60 ? "..." : "");
            }

            chapters.splice(prevChapterIndex + 1, 0, chapter);

            updateChapterList();
            selectChapter(chapter.id);

            if (deletedChapters.length === 0) {
                hideRestoreButton();
            }
        }

        function showRestoreButton() {
            const restoreBtn = document.getElementById('restore-button');
            if (restoreBtn) {
                restoreBtn.classList.remove('hidden');
            }
        }

        function hideRestoreButton() {
