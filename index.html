                    <div class="h-full flex flex-col items-center justify-center p-6 text-center text-stone-300 opacity-60">
                        <i data-lucide="file-text" class="w-10 h-10 mb-2"></i>
                        <p class="text-[10px] font-bold uppercase tracking-wider">暂无文件</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }
            
            files.forEach(f => {
                const isActive = activeFileId === f.id;
                const isSelected = selectedFileIds.includes(f.id);
                const isExpanded = expandedFileIds.has(f.id);
                const isEditing = editingFileId === f.id;
                const suspiciousList = suspiciousChapters.get(f.id) || [];
                const suspiciousCount = suspiciousList.length;
                
                const div = document.createElement('div');
                div.className = "space-y-1";
                div.innerHTML = `
                    <div class="group p-3 rounded-xl border transition-all cursor-pointer ${isActive ? 'bg-stone-50 border-stone-300 shadow-sm' : 'bg-white border-stone-100'}" onclick="setActiveFile('${f.id}')">
                        <div class="flex items-center gap-3">
                            <div onclick="toggleSelect(event, '${f.id}')" class="w-4 h-4 rounded border flex items-center justify-center ${isSelected ? 'bg-stone-900 border-stone-900 text-white' : 'bg-white border-stone-200'}">
                                ${isSelected ? '<i data-lucide="check" class="w-2.5 h-2.5"></i>' : ''}
                            </div>
                            <div class="flex-1 min-w-0">
                                ${isEditing ? `
                                    <input id="edit-input-${f.id}" type="text" value="${editingTitle}" onblur="saveTitle('${f.id}')" onkeydown="if(event.key==='Enter')saveTitle('${f.id}')" class="w-full text-[11px] font-bold bg-white border border-stone-300 rounded px-2 py-1 focus:outline-none focus:border-stone-500" />
                                ` : `
                                    <div class="flex items-center gap-2">
                                        <p class="text-[11px] font-bold truncate">${f.title}</p>
                                        ${suspiciousCount > 0 ? `<span onclick="event.stopPropagation(); jumpToFirstSuspiciousChapter('${f.id}')" class="text-[9px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-bold cursor-pointer hover:bg-red-200 transition-colors">${suspiciousCount}个可疑章节</span>` : ''}
                                    </div>
                                    <p class="text-[9px] text-stone-400 mt-0.5">${f.chapters.length} 章节</p>
                                `}
                            </div>
                            <div class="flex items-center gap-1">
                                ${!isEditing ? `
                                    <button onclick="event.stopPropagation(); startEdit('${f.id}')" class="p-1 text-stone-400 hover:text-stone-600 transition-colors">
                                        <i data-lucide="edit" class="w-3.5 h-3.5"></i>
                                    </button>
                                ` : `
                                    <button onclick="event.stopPropagation(); saveTitle('${f.id}')" class="p-1 text-green-600 hover:text-green-700 transition-colors">
                                        <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                    </button>
                                `}
                                <button onclick="toggleExpand(event, '${f.id}')" class="p-1 text-stone-400 hover:text-stone-600 transition-colors">
                                    <i data-lucide="${isExpanded ? 'chevron-up' : 'chevron-down'}" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    ${isExpanded ? `
                        <div class="ml-4 mr-2 space-y-1 border-l-2 border-stone-100 pl-3">
                            ${f.chapters.map((ch, idx) => {
                                const chapterId = `${f.id}-${idx}`;
                                const isEditingChapter = editingChapterId === chapterId;
                                const isSuspicious = ch.isSuspicious;
                                return `
                                    <div class="group flex items-center gap-1 text-[10px] ${isSuspicious ? 'bg-red-50 border border-red-200' : 'text-stone-600 hover:text-stone-900'} py-1 px-2 rounded hover:bg-stone-50 transition-colors">
                                        ${isEditingChapter ? `
                                            <input id="edit-chapter-${chapterId}" type="text" value="${editingChapterTitle}" onblur="saveChapterTitle('${f.id}', ${idx})" onkeydown="if(event.key==='Enter')saveChapterTitle('${f.id}', ${idx})" class="flex-1 text-[10px] bg-white border border-stone-300 rounded px-1 py-0.5 focus:outline-none focus:border-stone-500" />
                                        ` : `
                                            <span class="text-stone-300 mr-2">${String(idx + 1).padStart(2, '0')}</span>
                                            <span class="flex-1 truncate cursor-pointer" onclick="event.stopPropagation(); showChapter('${f.id}', ${idx})">${ch.title}</span>
                                            ${isSuspicious ? '<i data-lucide="alert-circle" class="w-3 h-3 text-red-500"></i>' : ''}
                                        `}
                                        <div class="flex items-center gap-1 ${isSuspicious ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'} transition-opacity">
                                            ${isSuspicious && !isEditingChapter ? `
                                                <button onclick="event.stopPropagation(); confirmChapter('${f.id}', ${idx})" class="p-0.5 text-green-600 hover:text-green-700 transition-colors" title="确认这是正确章节">
                                                    <i data-lucide="check-circle" class="w-3 h-3"></i>
                                                </button>
                                                <button onclick="event.stopPropagation(); startEditChapter('${f.id}', ${idx})" class="p-0.5 text-stone-400 hover:text-stone-600 transition-colors" title="编辑章节">
                                                    <i data-lucide="edit-2" class="w-3 h-3"></i>
                                                </button>
                                                <button onclick="event.stopPropagation(); deleteChapter('${f.id}', ${idx})" class="p-0.5 text-red-400 hover:text-red-600 transition-colors" title="删除章节">
                                                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                                                </button>
                                            ` : !isEditingChapter ? `
                                                <button onclick="event.stopPropagation(); startEditChapter('${f.id}', ${idx})" class="p-0.5 text-stone-400 hover:text-stone-600 transition-colors">
                                                    <i data-lucide="edit-2" class="w-3 h-3"></i>
                                                </button>
                                                <button onclick="event.stopPropagation(); deleteChapter('${f.id}', ${idx})" class="p-0.5 text-red-400 hover:text-red-600 transition-colors">
                                                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                                                </button>
                                            ` : `
                                                <button onclick="event.stopPropagation(); saveChapterTitle('${f.id}', ${idx})" class="p-0.5 text-green-600 hover:text-green-700 transition-colors">
                                                    <i data-lucide="check" class="w-3 h-3"></i>
                                                </button>
                                            `}
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    ` : ''}
                `;
                list.appendChild(div);
            });
            
            document.getElementById('exportAllBtn').disabled = selectedFileIds.length < 2;
            lucide.createIcons();
        }

        function toggleSelect(e, id) {
            e.stopPropagation();
            // 如果正在编辑书名，不重新渲染列表
            if (editingFileId) {
                if (selectedFileIds.includes(id)) {
                    selectedFileIds = selectedFileIds.filter(i => i !== id);
                } else {
                    selectedFileIds.push(id);
                }
                // 只更新复选框状态，不重新渲染整个列表
                const checkbox = e.currentTarget;
                const checkIcon = checkbox.querySelector('i');
                const isSelected = selectedFileIds.includes(id);
                if (isSelected) {
                    checkbox.classList.add('bg-stone-900', 'border-stone-900', 'text-white');
                    checkbox.classList.remove('bg-white', 'border-stone-200');
                    if (checkIcon) {
                        checkIcon.outerHTML = '<i data-lucide="check" class="w-2.5 h-2.5"></i>';
                    }
                } else {
                    checkbox.classList.remove('bg-stone-900', 'border-stone-900', 'text-white');
                    checkbox.classList.add('bg-white', 'border-stone-200');
                    if (checkIcon) {
                        checkIcon.remove();
                    }
                }
                lucide.createIcons();
            } else {
                if (selectedFileIds.includes(id)) {
                    selectedFileIds = selectedFileIds.filter(i => i !== id);
                } else {
                    selectedFileIds.push(id);
                }
                renderFileList();
            }
            
            document.getElementById('exportAllBtn').disabled = selectedFileIds.length < 2;
        }

        function toggleExpand(e, id) {
            e.stopPropagation();
            // 如果正在编辑书名，不重新渲染列表
            if (editingFileId) {
                if (expandedFileIds.has(id)) {
                    expandedFileIds.delete(id);
                } else {
                    expandedFileIds.add(id);
                }
                // 只更新展开/收起图标，不重新渲染整个列表
                const button = e.currentTarget;
                const icon = button.querySelector('i');
                const isExpanded = expandedFileIds.has(id);
                if (icon) {
                    icon.setAttribute('data-lucide', isExpanded ? 'chevron-up' : 'chevron-down');
                    lucide.createIcons();
                }
            } else {
                if (expandedFileIds.has(id)) {
                    expandedFileIds.delete(id);
                } else {
                    expandedFileIds.add(id);
                }
                renderFileList();
            }
        }

        function clearFileList() {
            if (files.length === 0) {
                return;
            }
            
            files = [];
            selectedFileIds = [];
            activeFileId = null;
            expandedFileIds.clear();
            editingFileId = null;
            editingTitle = '';
            editingChapterId = null;
            editingChapterTitle = '';
            suspiciousChapters.clear();
            
            const coverPreview = document.getElementById('coverPreview');
            coverPreview.style.backgroundImage = 'none';
            coverPreview.style.backgroundColor = '#1c1917';
            coverPreview.style.color = '#ffffff';
            
            const colorButtons = document.querySelectorAll('#colorPalette button');
            colorButtons.forEach(btn => {
                btn.classList.remove('border-stone-900', 'scale-110');
                btn.classList.add('border-transparent');
            });
            
            document.getElementById('aiPrompt').value = '';
            
            document.getElementById('bookTitle').value = '';
            document.getElementById('bookAuthor').value = '';
            document.getElementById('bookPublisher').value = '';
            
            setAiStyle('minimalist');
            
            const previewContent = document.getElementById('previewContent');
            if (previewContent) {
                previewContent.innerHTML = '<div class="text-center text-stone-400 py-8"><i data-lucide="file-text" class="w-12 h-12 mx-auto mb-2"></i><p class="text-sm">请选择章节进行预览</p></div>';
            }
            
            const chapterList = document.getElementById('chapterList');
            if (chapterList) {
                chapterList.innerHTML = '';
            }
            
            renderFileList();
            
            updateUI();
            
            setTimeout(() => {
                lucide.createIcons();
            }, 100);
            
            console.log('书籍列表已清空，所有界面已复原');
        }

        function startEdit(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;
            editingFileId = id;
            editingTitle = file.title;
            renderFileList();
            
            // 设置焦点到输入框
            setTimeout(() => {
                const input = document.getElementById(`edit-input-${id}`);
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 50);
        }

        function saveTitle(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;
            
            const input = document.getElementById(`edit-input-${id}`);
            if (input) {
                const newTitle = input.value.trim();
                if (newTitle && newTitle !== file.title) {
                    file.title = newTitle;
                }
            }
            
            const isActiveFile = activeFileId === id;
            editingFileId = null;
            editingTitle = '';
            renderFileList();
            
            // 如果编辑的是当前活动书籍，更新UI
            if (isActiveFile) {
                updateUI();
            }
        }

        function startEditChapter(fileId, chapterIndex) {
            const file = files.find(f => f.id === fileId);
            if (!file || !file.chapters[chapterIndex]) return;
            
            editingChapterId = `${fileId}-${chapterIndex}`;
            editingChapterTitle = file.chapters[chapterIndex].title;
            renderFileList();
            
            setTimeout(() => {
                const input = document.getElementById(`edit-chapter-${editingChapterId}`);
                if (input) {
                    input.focus();
                    input.select();
                }
            }, 50);
        }

        function saveChapterTitle(fileId, chapterIndex) {
            const file = files.find(f => f.id === fileId);
            if (!file || !file.chapters[chapterIndex]) return;
            
            const input = document.getElementById(`edit-chapter-${editingChapterId}`);
            if (input) {
                const newTitle = input.value.trim();
                if (newTitle && newTitle !== file.chapters[chapterIndex].title) {
                    file.chapters[chapterIndex].title = newTitle;
                    // 编辑后将章节标记为非可疑
                    file.chapters[chapterIndex].isSuspicious = false;
                    
                    // 更新可疑章节列表
                    const suspiciousList = suspiciousChapters.get(fileId) || [];
                    const idx = suspiciousList.indexOf(chapterIndex);
                    if (idx > -1) {
                        suspiciousList.splice(idx, 1);
                    }
                    
                    if (suspiciousList.length === 0) {
                        suspiciousChapters.delete(fileId);
                    }
                }
            }
            
            editingChapterId = null;
            editingChapterTitle = '';
            renderFileList();
            
            if (activeFileId === fileId) {
                const suspiciousList = suspiciousChapters.get(fileId) || [];
                if (suspiciousList.length > 0) {
                    // 找到当前章节之后的下一个误识别章节
                    const nextSuspiciousIndex = suspiciousList.find(index => index > chapterIndex) || suspiciousList[0];
                    showChapter(fileId, nextSuspiciousIndex);
                    scrollToChapter(nextSuspiciousIndex);
                } else {
                    updateUI();
                }
            }
        }

        function confirmChapter(fileId, chapterIndex) {
            const file = files.find(f => f.id === fileId);
            if (!file || !file.chapters[chapterIndex]) return;
            
            file.chapters[chapterIndex].isSuspicious = false;
            
            const suspiciousList = suspiciousChapters.get(fileId) || [];
            const idx = suspiciousList.indexOf(chapterIndex);
            if (idx > -1) {
                suspiciousList.splice(idx, 1);
            }
            
            if (suspiciousList.length === 0) {
                suspiciousChapters.delete(fileId);
            }
            
            renderFileList();
            
            if (suspiciousList.length > 0) {
                // 找到当前章节之后的下一个误识别章节
                const nextSuspiciousIndex = suspiciousList.find(index => index > chapterIndex) || suspiciousList[0];
                showChapter(fileId, nextSuspiciousIndex);
                scrollToChapter(nextSuspiciousIndex);
            } else if (activeFileId === fileId) {
                updateUI();
            }
        }

        function deleteChapter(fileId, chapterIndex) {
            const file = files.find(f => f.id === fileId);
            if (!file || !file.chapters[chapterIndex]) return;
            
            const chapterToDelete = file.chapters[chapterIndex];
            
            if (chapterIndex > 0) {
                const prevChapter = file.chapters[chapterIndex - 1];
                prevChapter.content += '\n\n' + chapterToDelete.title + '\n\n' + chapterToDelete.content;
            }
            
            file.chapters.splice(chapterIndex, 1);
            
            const suspiciousList = suspiciousChapters.get(fileId) || [];
            const idx = suspiciousList.indexOf(chapterIndex);
            if (idx > -1) {
                suspiciousList.splice(idx, 1);
            }
            
            const updatedSuspiciousList = suspiciousList.map(i => i > chapterIndex ? i - 1 : i);
            suspiciousChapters.set(fileId, updatedSuspiciousList);
            
            if (updatedSuspiciousList.length === 0) {
                suspiciousChapters.delete(fileId);
            }
            
            renderFileList();
            
            if (activeFileId === fileId) {
                if (updatedSuspiciousList.length > 0) {
                    const nextSuspiciousIndex = updatedSuspiciousList.find(index => index > chapterIndex - 1) || updatedSuspiciousList[0];
                    showChapter(fileId, nextSuspiciousIndex);
                    scrollToChapter(nextSuspiciousIndex);
                } else if (chapterIndex > 0) {
                    showChapter(fileId, chapterIndex - 1);
                } else if (file.chapters.length > 0) {
                    showChapter(fileId, 0);
                } else {
                    updateUI();
                }
            }
        }

        function jumpToFirstSuspiciousChapter(fileId) {
            const suspiciousList = suspiciousChapters.get(fileId) || [];
            if (suspiciousList.length === 0) return;
            
            expandedFileIds.add(fileId);
            activeFileId = fileId;
            
            const firstSuspiciousIndex = suspiciousList[0];
            showChapter(fileId, firstSuspiciousIndex);
            
            setTimeout(() => {
                renderFileList();
                scrollToChapter(firstSuspiciousIndex);
            }, 50);
        }

        function expandAllFiles() {
            files.forEach(f => expandedFileIds.add(f.id));
            renderFileList();
        }

        function collapseAllFiles() {
            expandedFileIds.clear();
            renderFileList();
        }

        function handleCoverImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                const imageDataUrl = e.target.result;
                
                const activeFile = files.find(f => f.id === activeFileId);
                if (activeFile) {
                    activeFile.uploadedCover = imageDataUrl;
                    
                    const coverPreview = document.getElementById('coverPreview');
                    coverPreview.style.backgroundImage = `url(${imageDataUrl})`;
                    coverPreview.style.backgroundSize = 'cover';
                    coverPreview.style.backgroundPosition = 'center';
                    coverPreview.style.backgroundColor = 'transparent';
                }
            };
            reader.readAsDataURL(file);
            
            event.target.value = '';
        }

        function toggleCoverText() {
            const file = files.find(f => f.id === activeFileId);
            if (!file) return;
            
            file.showCoverText = file.showCoverText === false ? true : false;
            
            const coverPreview = document.getElementById('coverPreview');
            const coverTextToggle = document.getElementById('coverTextToggle');
            const toggleSpan = coverTextToggle.querySelector('span');
            const coverTextElements = coverPreview.querySelectorAll('.cover-text');
            
            if (file.showCoverText === false) {
                coverTextToggle.classList.remove('bg-stone-900');
                coverTextToggle.classList.add('bg-stone-200');
                toggleSpan.classList.remove('translate-x-5');
                toggleSpan.classList.add('translate-x-0');
                coverTextElements.forEach(el => el.style.display = 'none');
            } else {
                coverTextToggle.classList.remove('bg-stone-200');
                coverTextToggle.classList.add('bg-stone-900');
                toggleSpan.classList.remove('translate-x-0');
                toggleSpan.classList.add('translate-x-5');
                coverTextElements.forEach(el => el.style.display = 'block');
            }
        }

        function setCoverMode(mode) {
            coverMode = mode;
            
            const file = files.find(f => f.id === activeFileId);
            if (!file) return;
            
            file.coverMode = mode;
            
            const framingSection = document.querySelector('[onclick="setCoverMode(\'framing\')"]');
            const aiSection = document.querySelector('[onclick="setCoverMode(\'ai\')"]');
            
            if (mode === 'framing') {
                framingSection.classList.add('border-stone-900', 'ring-2', 'ring-stone-200');
                framingSection.classList.remove('border-stone-200');
                aiSection.classList.remove('border-stone-900', 'ring-2', 'ring-stone-200');
                aiSection.classList.add('border-stone-200');
            } else {
                aiSection.classList.add('border-stone-900', 'ring-2', 'ring-stone-200');
                aiSection.classList.remove('border-stone-200');
                framingSection.classList.remove('border-stone-900', 'ring-2', 'ring-stone-200');
                framingSection.classList.add('border-stone-200');
            }
        }

        function scrollToChapter(index) {
            const chapterElements = document.querySelectorAll('[data-chapter-index]');
            const targetElement = chapterElements[index];
            if (targetElement) {
                targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetElement.classList.add('bg-amber-50');
                setTimeout(() => {
                    targetElement.classList.remove('bg-amber-50');
                }, 2000);
            }
            showChapter(activeFileId, index);
        }

        function setActiveFile(id) {
            // 如果正在编辑书名，不切换活动文件
            if (editingFileId) {
                return;
            }
            
            activeFileId = id;
            const file = files.find(f => f.id === id);
            
            document.getElementById('configContainer').classList.remove('hidden');
            document.getElementById('emptyConfig').classList.add('hidden');
            
            const suspiciousList = suspiciousChapters.get(id) || [];
            if (suspiciousList.length > 0) {
                showChapter(id, suspiciousList[0]);
                scrollToChapter(suspiciousList[0]);
            } else {
                updateUI();
            }
            
            // 同步表单（如果不是正在编辑状态）
            if (editingFileId !== id) {
                document.getElementById('bookTitle').value = file.title;
                document.getElementById('bookAuthor').value = file.author;
                document.getElementById('bookPublisher').value = file.publisher;
            }
            
            // 同步排版设置
            document.getElementById('fontFamily').value = file.fontFamily;
            document.getElementById('fontSize').value = file.fontSize;
            document.getElementById('lineHeight').value = file.lineHeight;
            document.getElementById('paragraphSpacing').value = file.paragraphSpacing;
            document.getElementById('pageMargin').value = file.pageMargin;
            
            // 更新滑块显示值
            document.getElementById('fontSizeValue').textContent = file.fontSize + 'pt';
            document.getElementById('lineHeightValue').textContent = file.lineHeight;
            document.getElementById('paragraphSpacingValue').textContent = file.paragraphSpacing + 'em';
            document.getElementById('pageMarginValue').textContent = file.pageMargin + '%';
            
            // 同步装帧设置
            const coverPreview = document.getElementById('coverPreview');
            
            if (file.uploadedCover) {
                coverPreview.style.backgroundImage = `url(${file.uploadedCover})`;
                coverPreview.style.backgroundSize = 'cover';
                coverPreview.style.backgroundPosition = 'center';
                coverPreview.style.backgroundColor = 'transparent';
            } else if (file.hasAiCover && file.aiCover) {
                coverPreview.style.backgroundImage = `url(${file.aiCover})`;
                coverPreview.style.backgroundSize = 'cover';
                coverPreview.style.backgroundPosition = 'center';
                coverPreview.style.backgroundColor = 'transparent';
            } else {
                coverPreview.style.backgroundImage = 'none';
                coverPreview.style.backgroundColor = file.coverColor;
                coverPreview.style.color = file.coverTextColor;
            }
            
            // 更新封面预览的书名和作者
            document.getElementById('previewTitle').textContent = file.title;
            document.getElementById('previewAuthor').textContent = file.author;
            document.getElementById('previewPublisher').textContent = file.publisher;
            
            // 更新封面文字显示开关状态
            const coverTextToggle = document.getElementById('coverTextToggle');
            const toggleSpan = coverTextToggle.querySelector('span');
            const coverTextElements = coverPreview.querySelectorAll('.cover-text');
            if (file.showCoverText === false) {
                coverTextToggle.classList.remove('bg-stone-900');
                coverTextToggle.classList.add('bg-stone-200');
                toggleSpan.classList.remove('translate-x-5');
                toggleSpan.classList.add('translate-x-0');
                coverTextElements.forEach(el => el.style.display = 'none');
            } else {
                coverTextToggle.classList.remove('bg-stone-200');
                coverTextToggle.classList.add('bg-stone-900');
                toggleSpan.classList.remove('translate-x-0');
                toggleSpan.classList.add('translate-x-5');
                coverTextElements.forEach(el => el.style.display = 'block');
            }
            
            // 更新封面模式显示状态
            const framingSection = document.querySelector('[onclick="setCoverMode(\'framing\')"]');
            const aiSection = document.querySelector('[onclick="setCoverMode(\'ai\')"]');
            const fileCoverMode = file.coverMode || 'framing';
            if (fileCoverMode === 'framing') {
                framingSection.classList.add('border-stone-900', 'ring-2', 'ring-stone-200');
                framingSection.classList.remove('border-stone-200');
                aiSection.classList.remove('border-stone-900', 'ring-2', 'ring-stone-200');
                aiSection.classList.add('border-stone-200');
            } else {
                aiSection.classList.add('border-stone-900', 'ring-2', 'ring-stone-200');
                aiSection.classList.remove('border-stone-200');
                framingSection.classList.remove('border-stone-900', 'ring-2', 'ring-stone-200');
                framingSection.classList.add('border-stone-200');
            }
            
            // 更新颜色选择器状态
            const colorButtons = document.querySelectorAll('#colorPalette button');
            colorButtons.forEach(btn => {
                if (btn.style.backgroundColor === file.coverColor || 
                    rgbToHex(btn.style.backgroundColor) === file.coverColor) {
                    btn.classList.add('border-stone-900', 'scale-110');
                    btn.classList.remove('border-transparent');
                } else {
                    btn.classList.remove('border-stone-900', 'scale-110');
                    btn.classList.add('border-transparent');
                }
            });
            
            renderFileList();

            if (window.innerWidth < 640) switchTab('config');
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb;
            const result = rgb.match(/\d+/g);
            if (!result) return rgb;
            return '#' + result.slice(0, 3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        // 绑定输入监听
        ['bookTitle', 'bookAuthor', 'bookPublisher'].forEach(id => {
            document.getElementById(id).oninput = (e) => {
                const key = id.replace('book', '').toLowerCase();
                updateActiveFile(key, e.target.value);
            };
        });

        ['fontFamily', 'fontSize', 'lineHeight', 'paragraphSpacing', 'pageMargin'].forEach(id => {
            document.getElementById(id).oninput = (e) => {
                const key = id;
                const value = e.target.value;
                updateActiveFile(key, value, false);
                
                // 更新显示值
                if (id === 'fontSize') {
                    document.getElementById('fontSizeValue').textContent = value + 'pt';
                } else if (id === 'lineHeight') {
                    document.getElementById('lineHeightValue').textContent = value;
                } else if (id === 'paragraphSpacing') {
                    document.getElementById('paragraphSpacingValue').textContent = value + 'em';
                } else if (id === 'pageMargin') {
                    document.getElementById('pageMarginValue').textContent = value + '%';
                }
                
                // 只更新预览样式，不重新渲染章节
                updatePreviewStyles();
            };
        });

        function updateActiveFile(key, value, shouldUpdateUI = true) {
            const file = files.find(f => f.id === activeFileId);
            if (file) {
                const oldValue = file[key];
                file[key] = value;
                
                // 如果修改了书名，需要重新渲染文件列表
                if (key === 'title' && value !== oldValue) {
                    renderFileList();
                }
                
                if (shouldUpdateUI) {
                    updateUI();
                }
            }
        }

        function updatePreviewStyles() {
            const reader = document.getElementById('readerPreview');
            const contentDiv = reader.querySelector('div');
            
            if (!contentDiv) return;
            
            const fontFamily = document.getElementById('fontFamily').value;
            const fontSize = document.getElementById('fontSize').value;
            const lineHeight = document.getElementById('lineHeight').value;
            const paragraphSpacing = document.getElementById('paragraphSpacing').value;
            const pageMargin = document.getElementById('pageMargin').value;
            
            const bgColor = previewMode === 'kindle' ? '#f5f5f5' : '#fcfbf9';
            const textColor = previewMode === 'kindle' ? '#1a1a1a' : '#1c1917';
            
            reader.style.backgroundColor = bgColor;
            contentDiv.style.fontFamily = fontFamily;
            contentDiv.style.fontSize = fontSize + 'px';
            contentDiv.style.lineHeight = lineHeight;
            contentDiv.style.padding = pageMargin + '%';
            contentDiv.style.color = textColor;
            
            const paragraphs = contentDiv.querySelectorAll('p');
            paragraphs.forEach(p => {
                p.style.marginBottom = paragraphSpacing + 'em';
            });
            
            const titleElement = contentDiv.querySelector('h4');
            if (titleElement) {
                titleElement.style.fontSize = (parseInt(fontSize) + 4) + 'px';
            }
        }

        function updateUI() {
            const file = files.find(f => f.id === activeFileId);
            
            if (!file) {
                // 没有活动文件时，清空预览界面
                const cover = document.getElementById('coverPreview');
                cover.style.backgroundImage = 'none';
                cover.style.backgroundColor = '#1c1917';
                cover.style.color = '#ffffff';
                document.getElementById('previewTitle').innerText = '';
                document.getElementById('previewAuthor').innerText = '';
                document.getElementById('previewPublisher').innerText = '';
                
                // 清空阅读预览
                const reader = document.getElementById('readerPreview');
                reader.innerHTML = `
                    <div class="text-center text-stone-400 py-8">
                        <i data-lucide="file-text" class="w-12 h-12 mx-auto mb-2"></i>
                        <p class="text-sm">请选择章节进行预览</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            // 封面预览
            const cover = document.getElementById('coverPreview');
            cover.style.backgroundColor = file.coverColor;
            cover.style.color = file.coverTextColor;
            document.getElementById('previewTitle').innerText = file.title;
            document.getElementById('previewAuthor').innerText = file.author;
            document.getElementById('previewPublisher').innerText = file.publisher;
            
            // 更新装帧实验室表单（如果不是正在编辑状态）
            if (editingFileId !== activeFileId) {
                document.getElementById('bookTitle').value = file.title;
                document.getElementById('bookAuthor').value = file.author;
                document.getElementById('bookPublisher').value = file.publisher;
            }

            // 获取排版设置
            const fontFamily = document.getElementById('fontFamily').value;
            const fontSize = document.getElementById('fontSize').value;
            const lineHeight = document.getElementById('lineHeight').value;
            const paragraphSpacing = document.getElementById('paragraphSpacing').value;
            const pageMargin = document.getElementById('pageMargin').value;

            // 根据预览模式设置背景色
            const bgColor = previewMode === 'kindle' ? '#f5f5f5' : '#fcfbf9';
            const textColor = previewMode === 'kindle' ? '#1a1a1a' : '#1c1917';

            // 阅读内页预览
            const reader = document.getElementById('readerPreview');
            const firstCh = file.chapters[0];
            reader.style.backgroundColor = bgColor;
            
            const isMarkdown = file.name && file.name.toLowerCase().endsWith('.md');
            let chapterContent;
            
            if (isMarkdown) {
                chapterContent = markdownToHtml(firstCh.content);
            } else {
                chapterContent = firstCh.content.split('\n').map(p => `<p style="text-indent: 2em; margin-bottom: ${paragraphSpacing}em;">${p.trim()}</p>`).join('');
            }
            
            reader.innerHTML = `
                <div style="font-family: ${fontFamily}; font-size: ${fontSize}px; line-height: ${lineHeight}; padding: ${pageMargin}%; color: ${textColor};">
                    <style>
                        .markdown-content pre { background: #f5f5f5; padding: 1em; border-radius: 4px; overflow-x: auto; margin: 1em 0; }
                        .markdown-content code { background: #f5f5f5; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
                        .markdown-content pre code { background: none; padding: 0; }
                        .markdown-content blockquote { border-left: 4px solid #ddd; margin: 1em 0; padding-left: 1em; color: #666; }
                        .markdown-content ul, .markdown-content ol { margin: 1em 0; padding-left: 2em; }
                        .markdown-content li { margin: 0.5em 0; }
                        .markdown-content hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
                        .markdown-content img { max-width: 100%; height: auto; display: block; margin: 1em auto; }
                        .markdown-content a { color: #0066cc; text-decoration: underline; }
                        .markdown-content h1, .markdown-content h2, .markdown-content h3 { margin: 1em 0 0.5em 0; font-weight: bold; }
                        .markdown-content h1 { font-size: 1.5em; }
                        .markdown-content h2 { font-size: 1.3em; }

                        .markdown-content p { margin-bottom: ${paragraphSpacing}em; }
                        .markdown-content p:not([style*="text-indent"]) { text-indent: 2em; }
                    </style>
                    <div class="mb-6 text-center border-b border-stone-100 pb-4">
                        <span class="text-[8px] text-amber-600 font-bold uppercase tracking-widest">预览</span>
                        <h4 class="font-bold mt-1" style="font-size: ${parseInt(fontSize) + 4}px;">${firstCh.title}</h4>
                    </div>
                    <div class="text-justify markdown-content">
                        ${chapterContent}
                    </div>
                </div>
            `;
        }

        function showChapter(fileId, chapterIndex) {

            if (!file || !file.chapters[chapterIndex]) return;

            const fontFamily = document.getElementById('fontFamily').value;
            const fontSize = document.getElementById('fontSize').value;
            const lineHeight = document.getElementById('lineHeight').value;
            const paragraphSpacing = document.getElementById('paragraphSpacing').value;
            const pageMargin = document.getElementById('pageMargin').value;

            const bgColor = previewMode === 'kindle' ? '#f5f5f5' : '#fcfbf9';
            const textColor = previewMode === 'kindle' ? '#1a1a1a' : '#1c1917';

            const reader = document.getElementById('readerPreview');
            const chapter = file.chapters[chapterIndex];
            reader.style.backgroundColor = bgColor;
            
            const isMarkdown = file.name && file.name.toLowerCase().endsWith('.md');
            let chapterContent;
            
            if (isMarkdown) {
                chapterContent = markdownToHtml(chapter.content);
            } else {
                chapterContent = chapter.content.split('\n').map(p => `<p style="text-indent: 2em; margin-bottom: ${paragraphSpacing}em;">${p.trim()}</p>`).join('');
            }
            
            reader.innerHTML = `
                <div style="font-family: ${fontFamily}; font-size: ${fontSize}px; line-height: ${lineHeight}; padding: ${pageMargin}%; color: ${textColor};">
                    <style>
                        .markdown-content pre { background: #f5f5f5; padding: 1em; border-radius: 4px; overflow-x: auto; margin: 1em 0; }
                        .markdown-content code { background: #f5f5f5; padding: 0.2em 0.4em; border-radius: 3px; font-family: monospace; font-size: 0.9em; }
                        .markdown-content pre code { background: none; padding: 0; }
                        .markdown-content blockquote { border-left: 4px solid #ddd; margin: 1em 0; padding-left: 1em; color: #666; }
                        .markdown-content ul, .markdown-content ol { margin: 1em 0; padding-left: 2em; }

                    </style>
                    <div class="mb-6 text-center border-b border-stone-100 pb-4">
                        <span class="text-[8px] text-amber-600 font-bold uppercase tracking-widest">预览</span>
                        <h4 class="font-bold mt-1" style="font-size: ${parseInt(fontSize) + 4}px;" data-chapter-index="${chapterIndex}">${chapter.title}</h4>

                        ${chapterContent}
                    </div>
                </div>
            `;
            
            if (window.innerWidth < 640) {
                switchTab('preview');
            }
        }

        // 导出逻辑 (简化版 JSZip)
        async function generateEpub(books, collectionTitle, collectionAuthor, coverColor = '#1c1917', coverTextColor = '#ffffff') {
            const zip = new JSZip();
            const uuid = `urn:uuid:${Math.random().toString(36).substring(2)}`;
            
            zip.file("mimetype", "application/epub+zip", { compression: "STORE" });
            zip.file("META-INF/container.xml", `<?xml version="1.0" encoding="UTF-8"?><container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container"><rootfiles><rootfile full-path="OEBPS/content.opf" media-type="application/oebps-package+xml"/></rootfiles></container>`);
            
            let manifest = "";
            let spine = "";
            let ncx = "";
            let playOrder = 1;
            let coverId = "";

            books.forEach(async (book, bIdx) => {
                const bookCoverColor = books.length === 1 ? coverColor : book.coverColor;
                const bookCoverTextColor = books.length === 1 ? coverTextColor : book.coverTextColor;
                
                let coverImageId = '';
                
                if (book.uploadedCover) {
                    const uploadedCoverData = book.uploadedCover;
                    const canvas = document.createElement('canvas');
                    canvas.width = 600;
                    canvas.height = 840;
                    const ctx = canvas.getContext('2d');
                    
                    const img = new Image();
                    img.src = uploadedCoverData;
                    await new Promise(resolve => {
                        img.onload = resolve;
                    });
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    if (book.showCoverText !== false) {
                        ctx.fillStyle = bookCoverTextColor;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        let titleFontSize = Math.min(canvas.width / 10, 48);
                        ctx.font = `bold ${titleFontSize}px 'Noto Serif SC', serif`;
                        
                        const maxTitleWidth = canvas.width * 0.8;
                        const titleLines = wrapText(ctx, book.title, maxTitleWidth, titleFontSize);
                        
                        const titleY = canvas.height * 0.4 - (titleLines.length - 1) * titleFontSize * 0.6;
                        
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        titleLines.forEach((line, index) => {
                            const y = titleY + index * titleFontSize * 1.2;
                            ctx.fillText(line, canvas.width / 2, y);
                        });
                        
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        ctx.shadowBlur = 5;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        
                        const authorFontSize = Math.min(canvas.width / 20, 24);
                        ctx.font = `italic ${authorFontSize}px 'Noto Serif SC', serif`;
                        
                        const authorText = book.author ? `${book.author} 著` : '未知 著';
                        ctx.fillText(authorText, canvas.width / 2, canvas.height * 0.6);
                    }
                    
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                    
                    const imageData = canvas.toDataURL('image/png').split(',')[1];
                    coverImageId = `cover-image-${bIdx}`;
                    zip.file(`OEBPS/${coverImageId}.png`, imageData, {base64: true});
                } else if (book.hasAiCover && book.aiCover) {
                    const aiCoverData = book.aiCover;
                    const canvas = document.createElement('canvas');
                    canvas.width = 600;
                    canvas.height = 840;
                    const ctx = canvas.getContext('2d');
                    
                    const img = new Image();
                    img.src = aiCoverData;
                    await new Promise(resolve => {
                        img.onload = resolve;
                    });
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    if (book.showCoverText !== false) {
                        ctx.fillStyle = bookCoverTextColor;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        let titleFontSize = Math.min(canvas.width / 10, 48);
                        ctx.font = `bold ${titleFontSize}px 'Noto Serif SC', serif`;
                        
                        const maxTitleWidth = canvas.width * 0.8;
                        const titleLines = wrapText(ctx, book.title, maxTitleWidth, titleFontSize);
                        
                        const titleY = canvas.height * 0.4 - (titleLines.length - 1) * titleFontSize * 0.6;
                        
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
                        ctx.shadowBlur = 10;
                        ctx.shadowOffsetX = 2;
                        ctx.shadowOffsetY = 2;
                        
                        titleLines.forEach((line, index) => {
                            const y = titleY + index * titleFontSize * 1.2;
                            ctx.fillText(line, canvas.width / 2, y);
                        });
                        
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        ctx.shadowBlur = 5;
                        ctx.shadowOffsetX = 1;
                        ctx.shadowOffsetY = 1;
                        
                        const authorFontSize = Math.min(canvas.width / 20, 24);
                        ctx.font = `italic ${authorFontSize}px 'Noto Serif SC', serif`;
                        
                        const authorText = book.author ? `${book.author} 著` : '未知 著';
                        ctx.fillText(authorText, canvas.width / 2, canvas.height * 0.6);
                    }
                    
                    ctx.shadowColor = 'transparent';
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetX = 0;
                    ctx.shadowOffsetY = 0;
                    
                    const imageData = canvas.toDataURL('image/png').split(',')[1];
                    coverImageId = `cover-image-${bIdx}`;
                    zip.file(`OEBPS/${coverImageId}.png`, imageData, {base64: true});
                } else {
                    const coverImageData = generateCoverImage(book.title, book.author, bookCoverColor, bookCoverTextColor, book.showCoverText !== false);
                    const imageData = coverImageData.split(',')[1];
                    coverImageId = `cover-image-${bIdx}`;
                    zip.file(`OEBPS/${coverImageId}.png`, imageData, {base64: true});
                }
                
                // 封面图片使用cover-image属性
                manifest += `<item id="${coverImageId}" href="${coverImageId}.png" media-type="image/png" properties="cover-image"/>\n`;
                
                // 创建封面页面（只显示封面图片，不重复显示文字）
                zip.file(`OEBPS/cover.xhtml`, `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${book.title}</title><style>body{background-image:url('${coverImageId}.png');background-size:cover;background-position:center;background-repeat:no-repeat;height:100vh;margin:0;}</style></head><body></body></html>`);
                manifest += `<item id="cover" href="cover.xhtml" media-type="application/xhtml+xml"/>\n`;
                coverId = "cover";
                // 封面页面不作为阅读内容，只作为封面
                // spine += `<itemref idref="cover"/>\n`;

                book.chapters.forEach((ch, cIdx) => {
                    const cid = `b${bIdx}c${cIdx}`;
                    const fontFamily = book.fontFamily || "'Noto Serif SC', serif";
                    const fontSize = book.fontSize || 16;
                    const lineHeight = book.lineHeight || 1.4;
                    const paragraphSpacing = book.paragraphSpacing || 0.5;
                    const pageMargin = book.pageMargin || 5;
                    
                    const isMarkdown = book.name && book.name.toLowerCase().endsWith('.md');
                    let chapterContent;
                    
                    if (isMarkdown) {
                        chapterContent = markdownToHtml(ch.content);
                    } else {
                        chapterContent = ch.content.split('\n').map(p => `<p>${p}</p>`).join('');
                    }
                    
                    const content = `<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE html><html xmlns="http://www.w3.org/1999/xhtml"><head><title>${ch.title}</title><style>body{font-family:${fontFamily};font-size:${fontSize}pt;line-height:${lineHeight};text-align:justify;padding:${pageMargin}%;background-color:#ffffff;color:#000000;}h2{text-align:center;margin-bottom:1.5em;}p{text-indent:2em;margin-bottom:${paragraphSpacing}em;}pre{background:#f5f5f5;padding:1em;border-radius:4px;overflow-x:auto;}code{background:#f5f5f5;padding:0.2em 0.4em;border-radius:3px;font-family:monospace;}blockquote{border-left:4px solid #ddd;margin:1em 0;padding-left:1em;color:#666;}ul,ol{margin:1em 0;padding-left:2em;}li{margin:0.5em 0;}hr{border:none;border-top:1px solid #ddd;margin:2em 0;}img{max-width:100%;height:auto;display:block;margin:1em auto;}a{color:#0066cc;text-decoration:underline;}</style></head><body><h2>${ch.title}</h2>${chapterContent}</body></html>`;
                    zip.file(`OEBPS/${cid}.xhtml`, content);
                    manifest += `<item id="${cid}" href="${cid}.xhtml" media-type="application/xhtml+xml"/>\n`;
                    spine += `<itemref idref="${cid}"/>\n`;
                    ncx += `<navPoint id="n-${cid}" playOrder="${playOrder++}"><navLabel><text>${ch.title}</text></navLabel><content src="${cid}.xhtml"/></navPoint>\n`;
                });
            });

            const metadata = `<metadata xmlns:dc="http://purl.org/dc/elements/1.1/"><dc:title>${collectionTitle}</dc:title><dc:creator>${collectionAuthor}</dc:creator><dc:language>zh-CN</dc:language><dc:identifier id="id">${uuid}</dc:identifier><meta name="cover" content="${coverId}"/></metadata>`;
            
            zip.file("OEBPS/content.opf", `<?xml version="1.0"?><package xmlns="http://www.idpf.org/2007/opf" version="2.0" unique-identifier="id">${metadata}<manifest>${manifest}<item id="ncx" href="toc.ncx" media-type="application/x-dtbncx+xml"/></manifest><spine toc="ncx">${spine}</spine></package>`);
            zip.file("OEBPS/toc.ncx", `<?xml version="1.0" encoding="UTF-8"?><ncx xmlns="http://www.daisy.org/z3986/2005/ncx/" version="2005-1"><head><meta name="dtb:uid" content="${uuid}"/></head><docTitle><text>${collectionTitle}</text></docTitle><navMap>${ncx}</navMap></ncx>`);

            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${collectionTitle}.epub`;
            a.click();
        }

        function exportSingle() {
            const file = files.find(f => f.id === activeFileId);
            if(file) {
                generateEpub([file], file.title, file.author, file.coverColor, file.coverTextColor);
                setTimeout(() => showConvertButton(), 300);
            }
        }

        function exportMerged() {
            const selected = files.filter(f => selectedFileIds.includes(f.id));
            if(selected.length === 0) return;
            
            const collectionTitle = prompt("请输入合集名称", "精选合集");
            if(collectionTitle === null) return;
            
            const collectionAuthor = prompt("请输入合集作者", "多位作者");
            
            generateEpub(selected, collectionTitle, collectionAuthor || "多位作者");
            setTimeout(() => showConvertButton(), 300);
        }

        async function exportBatch() {
            if (files.length === 0) {
                alert('没有可导出的书籍');
                return;
            }

            const confirmExport = confirm(`确定要批量导出 ${files.length} 本单行本吗？\n每本书将使用各自的装帧设置。`);
            if (!confirmExport) return;

            for (const file of files) {
                await generateEpub([file], file.title, file.author, file.coverColor, file.coverTextColor);
                
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            showConvertButton();
        }

        function showConvertButton() {
            const existingButton = document.getElementById('convertButton');
            if (existingButton) {
                existingButton.remove();
            }

            const button = document.createElement('div');
            button.id = 'convertButton';
            button.className = 'fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-white px-6 py-4 rounded-2xl shadow-2xl border border-stone-200 animate-in';
            button.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-purple-500 to-blue-500 rounded-xl flex items-center justify-center">
                        <i data-lucide="book-open" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="text-left">
                        <p class="text-sm font-bold text-stone-900">需要转换格式？</p>
                        <p class="text-xs text-stone-500">将 EPUB 转换为 AZW3 格式</p>
                    </div>
                </div>
                <button onclick="window.open('https://convertio.co/epub-azw3', '_blank')" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:from-purple-700 hover:to-blue-700 transition-all shadow-lg">
                    前往转换
                </button>
                <button onclick="document.getElementById('convertButton').remove()" class="p-2 text-stone-400 hover:text-stone-600 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            `;
            document.body.appendChild(button);
            lucide.createIcons();
        }
    </script>
