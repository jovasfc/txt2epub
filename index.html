<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文墨 · 专业 EPUB 转换</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .font-serif-sc { font-family: 'Noto Serif SC', serif; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: flex; }

        @media (max-width: 639px) {
            .mobile-hidden { display: none; }
        }
    </style>
</head>
<body class="bg-[#f8f7f4] text-stone-900 h-screen flex flex-col overflow-hidden">

    <!-- 顶部导航 -->
    <header class="h-14 bg-white border-b border-stone-200 flex items-center justify-between px-4 sm:px-6 shrink-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-stone-900 p-1.5 rounded-lg text-white">
                <i data-lucide="folder-tree" class="w-4 h-4"></i>
            </div>
            <span class="font-bold text-sm tracking-tight hidden sm:inline">文墨 · 专业 EPUB 转换</span>
            <span class="font-bold text-sm sm:hidden">文墨</span>
        </div>
        
        <!-- 移动端标签切换 -->
        <div class="flex sm:hidden bg-stone-100 rounded-lg p-1 scale-90" id="mobileTabs">
            <button onclick="switchTab('files')" id="btn-files" class="tab-btn px-3 py-1.5 rounded-md text-[10px] font-bold bg-white shadow-sm">文件</button>
            <button onclick="switchTab('config')" id="btn-config" class="tab-btn px-3 py-1.5 rounded-md text-[10px] font-bold text-stone-400">配置</button>
            <button onclick="switchTab('preview')" id="btn-preview" class="tab-btn px-3 py-1.5 rounded-md text-[10px] font-bold text-stone-400">预览</button>
        </div>

        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 bg-stone-900 text-white hover:bg-stone-800 px-3 py-1.5 sm:px-4 sm:py-2 rounded-full text-xs font-bold cursor-pointer transition-all shadow-md">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline">导入文件</span>
                <input type="file" id="fileInput" multiple accept=".txt,.md" class="hidden">
            </label>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden flex-col sm:flex-row relative">
        
        <!-- 左侧：文件列表 -->
        <aside id="tab-files" class="tab-content active sm:flex w-full sm:w-72 lg:w-80 border-r border-stone-200 bg-white flex-col shrink-0 absolute inset-0 sm:relative z-40">
            <div class="p-4 border-b border-stone-100 bg-stone-50/50 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-black uppercase text-stone-400 tracking-widest">书籍列表</span>
                <div class="flex items-center gap-1">
                    <button onclick="expandAllFiles()" class="text-stone-400 hover:text-stone-900 transition-colors" title="全部展开"><i data-lucide="chevrons-down" class="w-3 h-3"></i></button>
                    <button onclick="collapseAllFiles()" class="text-stone-400 hover:text-stone-900 transition-colors" title="全部收起"><i data-lucide="chevrons-up" class="w-3 h-3"></i></button>
                    <button onclick="clearFileList()" class="text-stone-400 hover:text-stone-900 transition-colors"><i data-lucide="refresh-ccw" class="w-3 h-3"></i></button>
                </div>
            </div>
            <div id="fileList" class="flex-1 overflow-y-auto p-3 space-y-2 custom-scrollbar">
                <!-- 初始空状态 -->
                <div class="h-full flex flex-col items-center justify-center p-6 text-center text-stone-300 opacity-60">
                    <i data-lucide="file-text" class="w-10 h-10 mb-2"></i>
                    <p class="text-[10px] font-bold uppercase tracking-wider">暂无文件</p>
                </div>
            </div>
            <div class="p-4 bg-stone-50 border-t border-stone-100 shrink-0">
                <button onclick="exportMerged()" id="exportAllBtn" disabled class="w-full bg-amber-600 text-white py-3 rounded-xl font-bold text-[11px] flex items-center justify-center gap-2 hover:bg-amber-700 disabled:opacity-30 transition-all shadow-lg shadow-amber-100">
                    <i data-lucide="package" class="w-3.5 h-3.5"></i> 导出合集
                </button>
            </div>
        </aside>

        <!-- 中间：配置区 -->
        <section id="tab-config" class="tab-content sm:flex flex-1 overflow-y-auto bg-[#f8f7f4] p-4 sm:p-8 custom-scrollbar absolute inset-0 sm:relative z-30">
            <div id="configContainer" class="max-w-4xl mx-auto w-full space-y-6 sm:space-y-8 hidden">
                <div class="flex items-center gap-3">
                    <i data-lucide="settings" class="w-4.5 h-4.5 text-stone-400"></i>
                    <h2 class="text-base sm:text-lg font-bold">书籍装帧实验室</h2>
                    <div class="h-px flex-1 bg-stone-200 ml-4"></div>
                </div>

                <div class="flex flex-col lg:flex-row gap-8">
                    <div class="flex-1 space-y-6 order-2 lg:order-2">
                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] border border-stone-200 shadow-sm space-y-6 cursor-pointer hover:border-stone-400 transition-colors" onclick="setCoverMode('framing')">
                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">封面装帧</label>
                            <div class="flex flex-wrap gap-3" id="colorPalette">
                                <!-- JS 填充颜色 -->
                            </div>
                        </div>
                        
                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] border border-stone-200 shadow-sm space-y-6 cursor-pointer hover:border-stone-400 transition-colors" onclick="setCoverMode('ai')">
                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">AI 生成封面</label>
                            <div class="space-y-4">
                                <div class="flex gap-2 flex-wrap">
                                    <button onclick="setAiStyle('minimalist')" class="ai-style-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-stone-200" data-style="minimalist">极简</button>
                                    <button onclick="setAiStyle('elegant')" class="ai-style-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-stone-200" data-style="elegant">典雅</button>
                                    <button onclick="setAiStyle('modern')" class="ai-style-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-stone-200" data-style="modern">现代</button>
                                    <button onclick="setAiStyle('classic')" class="ai-style-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-stone-200" data-style="classic">古典</button>
                                    <button onclick="setAiStyle('artistic')" class="ai-style-btn px-3 py-1.5 rounded-lg text-xs font-bold transition-all bg-stone-100 text-stone-600 hover:bg-stone-200" data-style="artistic">艺术</button>
                                </div>
                                <textarea id="aiPrompt" class="w-full px-4 py-3 rounded-xl bg-stone-50 border border-stone-200 text-sm focus:bg-white focus:border-stone-300 outline-none transition-all resize-none" rows="3" placeholder="描述您想要的封面风格，例如：水墨山水、现代简约、古典优雅..."></textarea>
                                <button onclick="generateAiCover()" id="generateAiBtn" class="w-full py-3 bg-gradient-to-r from-purple-600 to-blue-600 text-white rounded-xl font-bold text-sm flex items-center justify-center gap-2 hover:from-purple-700 hover:to-blue-700 transition-all shadow-lg">
                                    <i data-lucide="sparkles" class="w-4 h-4"></i> AI 生成封面
                                </button>
                                <div id="aiStatus" class="text-xs text-stone-500 text-center hidden"></div>
                            </div>
                        </div>
                        
                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] border border-stone-200 shadow-sm space-y-6">
                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">排版设置</label>
                            <div class="space-y-6">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                    <div class="space-y-2">
                                        <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">字体</label>
                                        <select id="fontFamily" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-transparent text-sm focus:bg-white focus:border-stone-300 outline-none transition-all">
                                            <option value="'Noto Serif SC', serif" selected>宋体</option>
                                            <option value="'KaiTi', serif">楷体</option>
                                            <option value="'SimSun', serif">宋体</option>
                                            <option value="'Noto Sans SC', sans-serif">黑体</option>
                                            <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
                                        </select>
                                    </div>
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center">
                                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">字号</label>
                                            <span id="fontSizeValue" class="text-xs text-stone-600 font-bold">16pt</span>
                                        </div>
                                        <input type="range" id="fontSize" min="12" max="20" value="16" step="1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-stone-900">
                                    </div>
                                </div>
                                <div class="grid grid-cols-3 gap-4">
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center">
                                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">行间距</label>
                                            <span id="lineHeightValue" class="text-xs text-stone-600 font-bold">1.8</span>
                                        </div>
                                        <input type="range" id="lineHeight" min="1.4" max="2.0" value="1.8" step="0.1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-stone-900">
                                    </div>
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center">
                                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">段间距</label>
                                            <span id="paragraphSpacingValue" class="text-xs text-stone-600 font-bold">0.5em</span>
                                        </div>
                                        <input type="range" id="paragraphSpacing" min="0" max="1.5" value="0.5" step="0.1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-stone-900">
                                    </div>
                                    <div class="space-y-2">
                                        <div class="flex justify-between items-center">
                                            <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">页边距</label>
                                            <span id="pageMarginValue" class="text-xs text-stone-600 font-bold">5%</span>
                                        </div>
                                        <input type="range" id="pageMargin" min="3" max="10" value="5" step="1" class="w-full h-2 bg-stone-200 rounded-lg appearance-none cursor-pointer accent-stone-900">
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex gap-3">
                            <button onclick="exportSingle()" class="flex-1 bg-stone-900 text-white py-5 rounded-[2rem] font-bold text-sm flex items-center justify-center gap-3 hover:bg-stone-800 transition-all shadow-xl active:scale-95">
                                <i data-lucide="download" class="w-4 h-4"></i> 生成当前 EPUB
                            </button>
                            <button onclick="exportBatch()" class="flex-1 bg-amber-600 text-white py-5 rounded-[2rem] font-bold text-sm flex items-center justify-center gap-3 hover:bg-amber-700 transition-all shadow-xl active:scale-95">
                                <i data-lucide="package" class="w-4 h-4"></i> 批量导出单行本
                            </button>
                        </div>
                    </div>

                    <div class="w-full lg:w-[320px] shrink-0 order-1 lg:order-2 space-y-4">
                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] border border-stone-200 shadow-sm space-y-4">
                            <div class="space-y-4">
                                <div class="space-y-1.5">
                                    <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">书名</label>
                                    <input type="text" id="bookTitle" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-transparent text-sm font-bold focus:bg-white focus:border-stone-300 outline-none transition-all">
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <div class="space-y-1.5">
                                        <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">作者</label>
                                        <input type="text" id="bookAuthor" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-transparent text-sm focus:bg-white focus:border-stone-300 outline-none transition-all">
                                    </div>
                                    <div class="space-y-1.5">
                                        <label class="text-[9px] font-black text-stone-400 uppercase tracking-widest">出版机构</label>
                                        <input type="text" id="bookPublisher" class="w-full px-4 py-3 rounded-xl bg-stone-50 border-transparent text-sm focus:bg-white focus:border-stone-300 outline-none transition-all">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white p-4 rounded-[2.5rem] border border-stone-200 shadow-xl">
                            <div class="relative group">
                                <div id="coverPreview" class="aspect-[3/4.2] w-full rounded-2xl flex flex-col items-center justify-between p-8 relative transition-all duration-500 overflow-hidden">
                                    <div class="absolute inset-y-0 left-0 w-8 bg-gradient-to-r from-black/20 to-transparent"></div>
                                    <div class="w-full h-1 bg-current opacity-10 rounded-full mt-4"></div>
                                    <div class="text-center space-y-4 px-4 z-10 cover-text">
                                        <p class="text-[8px] tracking-[0.4em] uppercase opacity-50 font-black">Digital Edition</p>
                                        <h3 id="previewTitle" class="text-2xl sm:text-3xl font-serif-sc font-bold leading-tight break-words"></h3>
                                        <div class="w-10 h-0.5 bg-current mx-auto opacity-30"></div>
                                        <p id="previewAuthor" class="text-xs font-medium opacity-80 italic"></p>
                                    </div>
                                    <div class="text-center space-y-2 z-10 cover-text">
                                        <p id="previewPublisher" class="text-[9px] font-black tracking-widest uppercase"></p>
                                    </div>
                                </div>
                                <button onclick="document.getElementById('coverImageInput').click()" class="absolute top-4 right-4 p-2 bg-white/90 backdrop-blur-sm rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i data-lucide="upload" class="w-4 h-4 text-stone-600"></i>
                                </button>
                            </div>
                            <div class="flex items-center justify-between px-2 pt-3">
                                <span class="text-[9px] font-black text-stone-400 uppercase tracking-widest">显示书名作者</span>
                                <button onclick="toggleCoverText()" id="coverTextToggle" class="relative w-10 h-5 bg-stone-900 rounded-full transition-colors">
                                    <span class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform transform translate-x-5"></span>
                                </button>
                            </div>
                            <input type="file" id="coverImageInput" accept="image/*" class="hidden" onchange="handleCoverImageUpload(event)">
                        </div>
                    </div>
                </div>
            </div>
            <!-- 空配置提示 -->
            <div id="emptyConfig" class="h-full w-full flex flex-col items-center justify-center text-stone-300 opacity-40">
                <i data-lucide="layout" class="w-12 h-12 mb-4"></i>
                <p class="text-xs font-bold uppercase tracking-widest">请选择一个文件进行装帧</p>
            </div>
        </section>

        <!-- 右侧：内页预览 -->
        <aside id="tab-preview" class="tab-content sm:flex w-full sm:w-80 lg:w-96 border-l border-stone-200 bg-stone-100 flex-col items-center justify-center p-6 shrink-0 absolute inset-0 sm:relative z-20">
            <div class="mb-4 flex gap-2">
                <button onclick="setPreviewMode('phone')" id="phoneModeBtn" class="preview-mode-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-stone-900 text-white">
                    <i data-lucide="smartphone" class="w-4 h-4 inline mr-1"></i> 手机
                </button>
                <button onclick="setPreviewMode('kindle')" id="kindleModeBtn" class="preview-mode-btn px-4 py-2 rounded-xl text-xs font-bold transition-all bg-stone-200 text-stone-600">
                    <i data-lucide="book-open" class="w-4 h-4 inline mr-1"></i> Kindle
                </button>
            </div>
            <div id="previewDevice" class="bg-white rounded-[2.5rem] p-2 shadow-2xl border-[6px] border-stone-800 w-[260px] h-[480px] relative overflow-hidden flex flex-col transition-all duration-300">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-16 h-4 bg-stone-800 rounded-b-xl z-20"></div>
                <div class="flex-1 overflow-y-auto p-5 bg-[#fcfbf9] custom-scrollbar" id="readerPreview">
                    <div class="h-full flex flex-col items-center justify-center opacity-10">
                        <i data-lucide="eye" class="w-10 h-10"></i>
                        <p class="text-[10px] mt-2 font-bold uppercase">内页预览</p>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        // 状态管理
        let files = [];
        let activeFileId = null;
        let selectedFileIds = [];
        let expandedFileIds = new Set();
        let editingFileId = null;
        let editingTitle = '';
        let editingChapterId = null;
        let editingChapterTitle = '';
        let suspiciousChapters = new Map(); // 存储误识别的章节信息
        let previewMode = 'phone'; // 预览模式：phone 或 kindle
        let coverMode = 'framing'; // 封面模式：framing（装帧）或 ai（AI生成）
        const colors = ['#1c1917', '#44403c', '#065f46', '#1e3a8a', '#7f1d1d', '#4c1d95', '#fbbf24'];

        // 初始化
        window.onload = () => {
            lucide.createIcons();
            initColorPalette();
            initTypographyListeners();
            initTypographyValues();
        };

        function initTypographyValues() {
            const typographySettings = ['fontFamily', 'fontSize', 'lineHeight', 'paragraphSpacing', 'pageMargin'];
            typographySettings.forEach(setting => {
                const element = document.getElementById(setting);
                if (element) {
                    updateTypographyValueDisplay(setting, element.value);
                }
            });
        }

        function initTypographyListeners() {
            const typographySettings = ['fontFamily', 'fontSize', 'lineHeight', 'paragraphSpacing', 'pageMargin'];
            
            typographySettings.forEach(setting => {
                const element = document.getElementById(setting);
                if (element) {
                    element.addEventListener('change', () => {
                        updateTypographyValueDisplay(setting, element.value);
                        updateActiveFile(setting, element.value);
                    });
                    element.addEventListener('input', () => {
                        updateTypographyValueDisplay(setting, element.value);
                        updateActiveFile(setting, element.value);
                    });
                }
            });
        }

        function updateTypographyValueDisplay(setting, value) {
            const valueElement = document.getElementById(setting + 'Value');
            if (valueElement) {
                switch(setting) {
                    case 'fontSize':
                        valueElement.textContent = value + 'pt';
                        break;
                    case 'lineHeight':
                        valueElement.textContent = value;
                        break;
                    case 'paragraphSpacing':
                        valueElement.textContent = value + 'em';
                        break;
                    case 'pageMargin':
                        valueElement.textContent = value + '%';
                        break;
                }
            }
        }

        function initColorPalette() {
            const container = document.getElementById('colorPalette');
            colors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `w-10 h-10 rounded-full border-4 border-transparent transition-transform hover:scale-110`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    updateActiveFile('coverColor', color);
                    updateActiveFile('coverTextColor', '#ffffff');
                    updateActiveFile('hasAiCover', false);
                    updateActiveFile('aiCover', null);
                    
                    // 更新封面预览
                    const coverPreview = document.getElementById('coverPreview');
                    coverPreview.style.backgroundImage = 'none';
                    coverPreview.style.backgroundColor = color;
                    coverPreview.style.color = '#ffffff';
                    
                    // 更新按钮状态
                    const colorButtons = document.querySelectorAll('#colorPalette button');
                    colorButtons.forEach(b => {
                        if (b === btn) {
                            b.classList.add('border-stone-900', 'scale-110');
                            b.classList.remove('border-transparent');
                        } else {
                            b.classList.remove('border-stone-900', 'scale-110');
                            b.classList.add('border-transparent');
                        }
                    });
                };
                container.appendChild(btn);
            });
        }

        let selectedAiStyle = 'minimalist';

        function setAiStyle(style) {
            selectedAiStyle = style;
            const buttons = document.querySelectorAll('.ai-style-btn');
            buttons.forEach(btn => {
                if (btn.dataset.style === style) {
                    btn.classList.remove('bg-stone-100', 'text-stone-600');
                    btn.classList.add('bg-purple-600', 'text-white');
                } else {
                    btn.classList.add('bg-stone-100', 'text-stone-600');
                    btn.classList.remove('bg-purple-600', 'text-white');
                }
            });
        }

        async function generateAiCover() {
            const file = files.find(f => f.id === activeFileId);
            if (!file) {
                alert('请先选择一本书籍');
                return;
            }

            const prompt = document.getElementById('aiPrompt').value.trim();
            const statusEl = document.getElementById('aiStatus');
            const btn = document.getElementById('generateAiBtn');

            btn.disabled = true;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> 生成中...';
            statusEl.classList.remove('hidden');
            statusEl.textContent = '正在生成封面，请稍候...';

            try {
                const canvas = document.createElement('canvas');
                canvas.width = 600;
                canvas.height = 840;
                const ctx = canvas.getContext('2d');

                await drawAiCover(ctx, canvas.width, canvas.height, file.title, file.author, selectedAiStyle, prompt);

                const imageDataUrl = canvas.toDataURL('image/png');
                updateActiveFile('aiCover', imageDataUrl);
                updateActiveFile('hasAiCover', true);

                const coverPreview = document.getElementById('coverPreview');
                coverPreview.style.backgroundImage = `url(${imageDataUrl})`;
                coverPreview.style.backgroundSize = 'cover';
                coverPreview.style.backgroundPosition = 'center';

                statusEl.textContent = '封面生成成功！';
                statusEl.classList.remove('text-stone-500');
                statusEl.classList.add('text-green-600');

                setTimeout(() => {
                    statusEl.classList.add('hidden');
                    statusEl.classList.remove('text-green-600');
                    statusEl.classList.add('text-stone-500');
                }, 3000);

            } catch (error) {
                console.error('AI生成封面失败:', error);
                statusEl.textContent = '生成失败，请重试';
                statusEl.classList.remove('text-stone-500');
                statusEl.classList.add('text-red-600');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="sparkles" class="w-4 h-4"></i> AI 生成封面';
                lucide.createIcons();
            }
        }

        // 生成封面图片
        function generateCoverImage(title, author, bgColor, textColor, includeText = true) {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 840;
            const ctx = canvas.getContext('2d');
            
            // 绘制背景
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制装饰元素
            ctx.fillStyle = textColor;
            ctx.globalAlpha = 0.05;
            for (let i = 0; i < 20; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const radius = Math.random() * 100 + 20;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
            
            // 如果不包含文字，直接返回
            if (!includeText) {
                return canvas.toDataURL('image/png');
            }
            
            // 绘制书名
            ctx.fillStyle = textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 书名字体大小自适应
            let titleFontSize = Math.min(canvas.width / 10, 48);
            ctx.font = `bold ${titleFontSize}px 'Noto Serif SC', serif`;
            
            // 书名换行处理
            const maxTitleWidth = canvas.width * 0.8;
            const titleLines = wrapText(ctx, title, maxTitleWidth, titleFontSize);
            
            // 计算书名位置
            const titleY = canvas.height * 0.4 - (titleLines.length - 1) * titleFontSize * 0.6;
            
            // 绘制书名阴影
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            titleLines.forEach((line, index) => {
                const y = titleY + index * titleFontSize * 1.2;
                ctx.fillText(line, canvas.width / 2, y);
            });
            
            // 绘制作者
            ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowBlur = 5;
            ctx.shadowOffsetX = 1;
            ctx.shadowOffsetY = 1;
            
            const authorFontSize = Math.min(canvas.width / 20, 24);
            ctx.font = `italic ${authorFontSize}px 'Noto Serif SC', serif`;
            
            // 作者信息
            const authorText = author ? `${author} 著` : '未知 著';
            ctx.fillText(authorText, canvas.width / 2, canvas.height * 0.6);
            
            // 清除阴影
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            return canvas.toDataURL('image/png');
        }

        // 文本换行函数
        function wrapText(ctx, text, maxWidth, fontSize) {
            const words = text.split('');
            const lines = [];
            let currentLine = words[0];
            
            for (let i = 1; i < words.length; i++) {
                const word = words[i];
                const width = ctx.measureText(currentLine + word).width;
                if (width < maxWidth) {
                    currentLine += word;
                } else {
                    lines.push(currentLine);
                    currentLine = word;
                }
            }
            lines.push(currentLine);
            return lines;
        }

        function detectAndDecode(arrayBuffer) {
            const uint8Array = new Uint8Array(arrayBuffer);
            
            const bomEncoding = detectBOM(uint8Array);
            if (bomEncoding) {
                console.log(`检测到BOM标记: ${bomEncoding}`);
                const decoder = new TextDecoder(bomEncoding);
                const text = decoder.decode(uint8Array);
                return text;
            }
            
            const encodings = [
                { name: 'UTF-8', decode: () => new TextDecoder('utf-8').decode(uint8Array) },
                { name: 'GBK', decode: () => new TextDecoder('gbk').decode(uint8Array) },
                { name: 'GB2312', decode: () => new TextDecoder('gb2312').decode(uint8Array) },
                { name: 'BIG5', decode: () => new TextDecoder('big5').decode(uint8Array) },
                { name: 'GB18030', decode: () => new TextDecoder('gb18030').decode(uint8Array) }
            ];
            
            let bestResult = null;
            let bestScore = -1;
            
            for (const encoding of encodings) {
                try {
                    const text = encoding.decode();
                    const score = calculateTextScore(text);
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestResult = text;
                        console.log(`检测到编码: ${encoding.name}, 得分: ${score.toFixed(2)}`);
                    }
                } catch (e) {
                    console.log(`编码 ${encoding.name} 解码失败:`, e.message);
                    continue;
                }
            }
            
            if (bestResult) {
                return bestResult;
            }
            
            console.log('编码检测失败，使用UTF-8');
            return new TextDecoder('utf-8').decode(uint8Array);
        }

        function detectBOM(uint8Array) {
            if (uint8Array.length < 3) return null;
            
            const b0 = uint8Array[0];
            const b1 = uint8Array[1];
            const b2 = uint8Array[2];
            
            if (b0 === 0xEF && b1 === 0xBB && b2 === 0xBF) {
                return 'utf-8';
            }
            if (b0 === 0xFE && b1 === 0xFF) {
                if (uint8Array.length >= 4) {
                    const b3 = uint8Array[3];
                    if (b3 === 0x00) return 'utf-16be';
                    if (b3 === 0xFE) return 'utf-16le';
                }
            }
            if (b0 === 0xFF && b1 === 0xFE) {
                if (uint8Array.length >= 4) {
                    const b3 = uint8Array[3];
                    if (b3 === 0x00) return 'utf-16le';
                    if (b3 === 0xFE) return 'utf-16be';
                }
            }
            
            return null;
        }

        function calculateTextScore(text) {
            if (!text || text.length < 10) return -1;
            
            let score = 0;
            
            const chineseChars = text.match(/[\u4e00-\u9fa5]/g) || [];
            const chineseRatio = chineseChars.length / text.length;
            score += chineseRatio * 50;
            
            const commonChars = text.match(/[的了是在有我他这为之大来个上们说去和要那会可对能小不么好都看还过么]/g) || [];
            const commonRatio = commonChars.length / text.length;
            score += commonRatio * 20;
            
            const invalidChars = text.match(/[\ufffd\u0000-\u0008\u000b-\u000c\u000e-\u001f]/g) || [];
            const invalidRatio = invalidChars.length / text.length;
            score -= invalidRatio * 100;
            
            const repeatedChars = text.match(/(.)\1{5,}/g) || [];
            const repeatedRatio = repeatedChars.length / text.length;
            score -= repeatedRatio * 30;
            
            const punctuationChars = text.match(/[，。！？；：""''（）【】《》]/g) || [];
            const punctuationRatio = punctuationChars.length / text.length;
            score += punctuationRatio * 10;
            
            const spaceChars = text.match(/[ \t\n\r]/g) || [];
            const spaceRatio = spaceChars.length / text.length;
            score += spaceRatio * 5;
            
            const validSentences = text.match(/[。！？\n]/g) || [];
            const sentenceRatio = validSentences.length / (text.length / 20);
            score += sentenceRatio * 15;
            
            return score;
        }

        function identifySuspiciousChapters(fileId, chapters) {
            const suspiciousIndices = [];
            chapters.forEach((ch, idx) => {
                if (ch.isSuspicious) {
                    suspiciousIndices.push(idx);
                }
            });
            suspiciousChapters.set(fileId, suspiciousIndices);
            
            if (suspiciousIndices.length > 0) {
                console.log(`文件 ${fileId} 发现 ${suspiciousIndices.length} 个误识别章节:`, suspiciousIndices);
            }
        }

        function parseChapters(text) {
            const fileName = files.find(f => f.id === activeFileId)?.name || '';
            const isMarkdown = fileName.toLowerCase().endsWith('.md');
            
            if (isMarkdown) {
                return parseMarkdownChapters(text);
            }
            
            const excludeSuffixes = ['课', '部', '团', '军', '队', '排', '连', '旅', '师', '群', '案', '目', '体', '集', '营', '班', '组', '员', '人', '名', '地', '处', '点', '站', '场', '馆', '所', '门', '系', '级', '类', '型', '种', '项', '条', '款', '次', '局', '会', '议', '赛', '战', '役', '期', '季', '度', '月', '日', '年', '代', '纪', '世', '界', '国', '省', '市', '县', '区', '乡', '镇', '村', '街', '路', '道', '桥', '河', '湖', '海', '山', '岭', '峰', '谷', '原', '野', '田', '园', '林', '厂', '店', '铺'];
            const excludeSuffixPattern = excludeSuffixes.join('');
            
            const patterns = [`^第[一二三四五六七八九十百千万0-9]+[章节卷回](?![${excludeSuffixPattern}])`, '^(序|引子|楔子|尾声|后记)'];
            const regex = new RegExp(patterns.join('|'));
            const lines = text.split(/\r?\n/);
            const chapters = [];
            let currentContent = [];
            let currentTitle = "前言";
            
            lines.forEach(line => {
                const trimmed = line.trim();
                let isChapter = regex.test(trimmed);

                if (isChapter) {
                    if (currentContent.length > 0 || currentTitle !== "前言") {
                        chapters.push({ title: currentTitle, content: currentContent.join('\n'), isSuspicious: false });
                    }
                    currentTitle = trimmed;
                    currentContent = [];
                } else {
                    currentContent.push(line);
                }
            });
            chapters.push({ title: currentTitle, content: currentContent.join('\n'), isSuspicious: false });
            
            if (chapters.length > 5) {
                const chapterPatterns = [];
                chapters.forEach((ch, idx) => {
                    if (idx > 0) {
                        const match = ch.title.match(/^第([一二三四五六七八九十百千万0-9]+)([章节卷回])/);
                        if (match) {
                            chapterPatterns.push({ number: match[1], type: match[2], index: idx });
                        }
                    }
                });
                
                if (chapterPatterns.length > 3) {
                    const typeCount = chapterPatterns.reduce((acc, curr) => {
                        acc[curr.type] = (acc[curr.type] || 0) + 1;
                        return acc;
                    }, {});
                    
                    const dominantType = Object.keys(typeCount).reduce((a, b) => 
                        typeCount[a] > typeCount[b] ? a : b
                    );
                    
                    const dominantTypeCount = typeCount[dominantType];
                    const totalChapters = chapterPatterns.length;
                    
                    if (dominantTypeCount / totalChapters > 0.6) {
                        chapterPatterns.forEach(pattern => {
                            if (pattern.type !== dominantType) {
                                if (chapters[pattern.index]) {
                                    chapters[pattern.index].isSuspicious = true;
                                }
                            }
                        });
                    }
                }
            }
            
            return chapters;
        }

        function parseMarkdownChapters(text) {
            const lines = text.split(/\r?\n/);
            const chapters = [];
            let currentContent = [];
            let currentTitle = "前言";
            
            lines.forEach(line => {
                const trimmed = line.trim();
                
                const h1Match = trimmed.match(/^#\s+(.+)$/);
                const h2Match = trimmed.match(/^##\s+(.+)$/);
                const h3Match = trimmed.match(/^###\s+(.+)$/);
                
                if (h1Match || h2Match || h3Match) {
                    if (currentContent.length > 0 || currentTitle !== "前言") {
                        chapters.push({ title: currentTitle, content: currentContent.join('\n'), isSuspicious: false });
                    }
                    currentTitle = (h1Match || h2Match || h3Match)[1];
                    currentContent = [];
                } else {
                    currentContent.push(line);
                }
            });
            
            chapters.push({ title: currentTitle, content: currentContent.join('\n'), isSuspicious: false });
            
            return chapters;
        }

        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            let html = markdown;
            
            html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
            
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            html = html.replace(/\*\*\*([^*]+)\*\*\*/g, '<strong><em>$1</em></strong>');
            
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            html = html.replace(/___([^_]+)___/g, '<strong><em>$1</em></strong>');
            
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            
            html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%;height:auto;"/>');
            
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
            
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            html = html.replace(/^\- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
            
            html = html.replace(/^---$/gm, '<hr/>');
            html = html.replace(/^\*\*\*$/gm, '<hr/>');
            
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/^/, '<p>');
            html = html.replace(/$/, '</p>');
            
            html = html.replace(/<p><pre>/g, '<pre>');
            html = html.replace(/<\/pre><\/p>/g, '</pre>');
            html = html.replace(/<p><h([1-6])>/g, '<h$1>');
            html = html.replace(/<\/h([1-6])><\/p>/g, '</h$1>');
            html = html.replace(/<p><ul>/g, '<ul>');
            html = html.replace(/<\/ul><\/p>/g, '</ul>');
            html = html.replace(/<p><blockquote>/g, '<blockquote>');
            html = html.replace(/<\/blockquote><\/p>/g, '</blockquote>');
            html = html.replace(/<p><hr\/><\/p>/g, '<hr/>');
            html = html.replace(/<p><\/p>/g, '');
            
            return html;
        }

        function extractTitleAndAuthor(text, fileName) {
            const first1000Chars = text.substring(0, 1000);
            let title = fileName.replace('.txt', '').replace('.md', '').replace(/[-_]/g, ' ');
            let author = '佚名';

            // 从文本内容中提取（优先）
            const lines = first1000Chars.split(/\r?\n/);
            
            for (const line of lines) {
                const trimmed = line.trim();
                
                // 支持《》和【】作为书名号
                const titleMatch = trimmed.match(/《([^》]+)》|【([^】]+)】/);
                if (titleMatch) {
                    const extractedTitle = (titleMatch[1] || titleMatch[2]).trim();
                    if (extractedTitle.length > 1 && extractedTitle.length < 50) {
                        title = extractedTitle;
                        break;
                    }
                }
                
                const authorMatch = trimmed.match(/(?:作者|Author|author|by|By|BY)[:：\s]+([^\n\r]+)/);
                if (authorMatch && authorMatch[1]) {
                    const extractedAuthor = authorMatch[1].trim();
                    if (extractedAuthor.length > 0 && extractedAuthor.length < 30) {
                        author = extractedAuthor;
                    }
                }
            }

            // 从文件名中提取更精确的信息
            let cleanFileName = fileName.replace('.txt', '').replace(/[-_]/g, ' ');
            
            // 移除（）中的辅助信息（如章节数量、是否完结等）
            cleanFileName = cleanFileName.replace(/[（\(][^）\)]*[）\)]/g, '').trim();
            
            // 支持《》和【】作为书名号
            const fileNameTitleMatch = cleanFileName.match(/《([^》]+)》|【([^】]+)】/);
            if (fileNameTitleMatch) {
                const extractedTitle = (fileNameTitleMatch[1] || fileNameTitleMatch[2]).trim();
                if (extractedTitle.length > 1 && extractedTitle.length < 50) {
                    title = extractedTitle;
                }
            }
            
            // 提取作者信息
            const authorMatch = cleanFileName.match(/作者[:：\s]+([^\(\)\[\]（）\[\]]+)/);
            if (authorMatch && authorMatch[1]) {
                const extractedAuthor = authorMatch[1].trim();
                if (extractedAuthor.length > 0 && extractedAuthor.length < 30) {
                    author = extractedAuthor;
                }
            } else {
                // 尝试其他作者信息格式
                const authorByMatch = cleanFileName.match(/(?:by|By|BY)[:：\s]+([^\s]+)/);
                if (authorByMatch && authorByMatch[1]) {
                    const extractedAuthor = authorByMatch[1].trim();
                    if (extractedAuthor.length > 0 && extractedAuthor.length < 30) {
                        author = extractedAuthor;
                    }
                }
            }

            return { title, author };
        }
